<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Maze Chase</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow:hidden;touch-action:none}
#wrap{position:relative;display:flex;flex-direction:column;align-items:center}
canvas{border-radius:8px;image-rendering:pixelated}
#hud{display:flex;justify-content:space-between;width:100%;max-width:460px;padding:8px 4px;font-size:16px;font-weight:600}
#hud span{min-width:80px}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,.75);border-radius:8px;z-index:10;text-align:center;gap:16px}
#overlay h1{font-size:2rem;color:#ffe14d;text-shadow:0 0 20px #ff0}
#overlay p{font-size:.9rem;color:#ccc;max-width:320px;line-height:1.5}
#overlay button{padding:12px 36px;font-size:1.1rem;border:none;border-radius:24px;background:linear-gradient(135deg,#ffe14d,#f0a000);color:#111;font-weight:700;cursor:pointer;transition:transform .15s}
#overlay button:hover{transform:scale(1.08)}
.lives{color:#f44;letter-spacing:2px}
#mobile-controls{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:20}
#mobile-controls button{width:56px;height:56px;border:none;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:24px;touch-action:manipulation}
#mobile-controls .row{display:flex;justify-content:center;gap:8px}
@media(pointer:coarse){#mobile-controls{display:block}}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span id="scoreEl">Score: 0</span>
    <span id="livesEl" class="lives"></span>
    <span id="levelEl" style="text-align:right">Level 1</span>
  </div>
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>🟡 Maze Chase</h1>
    <p>Eat all dots to advance. Eat a power pellet to turn the tables on ghosts! Use arrow keys or swipe to move.</p>
    <button id="startBtn">Play</button>
  </div>
  <div id="mobile-controls">
    <div class="row"><button data-dir="up">▲</button></div>
    <div class="row"><button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button></div>
  </div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const overlay=document.getElementById('overlay'),startBtn=document.getElementById('startBtn');
const scoreEl=document.getElementById('scoreEl'),livesEl=document.getElementById('livesEl'),levelEl=document.getElementById('levelEl');

const COLS=21,ROWS=23,T=20; // tile size
C.width=COLS*T;C.height=ROWS*T;

// 0=wall 1=dot 2=power 3=empty 4=ghost-house
const BASE_MAP=[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o###.###.#.###.###o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.### # ###.#####",
"    #.#       #.#    ",
"#####.# ##4## #.#####",
"     .  #444#  .     ",
"#####.# ##### #.#####",
"    #.#       #.#    ",
"#####.# ##### #.#####",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o..#.....P.....#..o#",
"###.#.#.#####.#.#.###",
"#.....#...#...#.....#",
"#.#######.#.#######.#",
"#...................#",
"#####################",
"#####################",
];

let map,dots,totalDots,score,lives,level,state; // state: menu,play,dead,win,over
let player,ghosts,nextDir,powerTimer,eatCombo;
let animFrame=0;

function parseMap(){
  map=[];dots=0;
  for(let r=0;r<ROWS;r++){
    map[r]=[];
    const row=BASE_MAP[r]||BASE_MAP[BASE_MAP.length-1];
    for(let c=0;c<COLS;c++){
      const ch=row[c]||'#';
      if(ch==='#')map[r][c]=0;
      else if(ch==='.')map[r][c]=1,dots++;
      else if(ch==='o')map[r][c]=2,dots++;
      else if(ch==='P'){map[r][c]=3;player={x:c,y:r,dx:0,dy:0,px:c*T,py:r*T,mouth:0};}
      else if(ch==='4')map[r][c]=4;
      else if(ch===' ')map[r][c]=3;
      else map[r][c]=3;
    }
  }
  totalDots=dots;
}

const GCOLS=['#ff4444','#ffaa55','#55ccff','#ff88dd'];
function spawnGhosts(){
  ghosts=[];
  const starts=[[10,10],[10,9],[9,10],[11,10]];
  for(let i=0;i<4;i++){
    const [gx,gy]=starts[i];
    ghosts.push({x:gx,y:gy,px:gx*T,py:gy*T,dx:0,dy:-1,color:GCOLS[i],scared:false,eaten:false,scatter:false,moveTimer:0,releaseTime:i*120});
  }
}

function init(lvl){
  parseMap();spawnGhosts();
  nextDir={dx:0,dy:0};powerTimer=0;eatCombo=0;
  player.dx=0;player.dy=0;player.px=player.x*T;player.py=player.y*T;
}

function resetPositions(){
  player.x=10;player.y=16;player.px=10*T;player.py=16*T;player.dx=0;player.dy=0;nextDir={dx:0,dy:0};
  const starts=[[10,10],[10,9],[9,10],[11,10]];
  ghosts.forEach((g,i)=>{const[gx,gy]=starts[i];g.x=gx;g.y=gy;g.px=gx*T;g.py=gy*T;g.dx=0;g.dy=-1;g.scared=false;g.eaten=false;g.moveTimer=0;});
  powerTimer=0;eatCombo=0;
}

function canMove(tx,ty){
  if(tx<0||tx>=COLS)return true; // tunnel
  if(ty<0||ty>=ROWS)return false;
  return map[ty][tx]!==0;
}

function wrapX(v){return((v%COLS)+COLS)%COLS;}

// Ghost AI
function ghostTarget(g,i){
  if(g.eaten)return{tx:10,ty:10};
  if(g.scared)return{tx:Math.random()*COLS|0,ty:Math.random()*ROWS|0};
  if(i===0)return{tx:player.x,ty:player.y};
  if(i===1)return{tx:player.x+player.dx*4,ty:player.y+player.dy*4};
  if(i===2){const dx=player.x-ghosts[0].x,dy=player.y-ghosts[0].y;return{tx:player.x+dx,ty:player.y+dy};}
  const dist=Math.abs(player.x-g.x)+Math.abs(player.y-g.y);
  if(dist<8)return{tx:0,ty:0};
  return{tx:player.x,ty:player.y};
}

function moveGhost(g,i,tick){
  if(tick<g.releaseTime)return;
  const speed=g.eaten?2:g.scared?0.7:(1+level*0.08);
  g.moveTimer+=speed;
  if(g.moveTimer<1)return;
  g.moveTimer=0;

  const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
  const {tx:ttx,ty:tty}=ghostTarget(g,i);
  let best=null,bestDist=1e9;
  for(const[dx,dy]of dirs){
    if(dx===-g.dx&&dy===-g.dy)continue; // no reverse
    const nx=wrapX(g.x+dx),ny=g.y+dy;
    if(!canMove(nx,ny)||map[ny]!==undefined&&map[ny][nx]===0)continue;
    if(!g.eaten&&map[ny]&&map[ny][nx]===4)continue; // don't re-enter house
    const d=(nx-ttx)**2+(ny-tty)**2;
    if(d<bestDist){bestDist=d;best={dx,dy,nx,ny};}
  }
  if(!best){// reverse if stuck
    g.dx=-g.dx;g.dy=-g.dy;
    const nx=wrapX(g.x+g.dx),ny=g.y+g.dy;
    if(canMove(nx,ny))best={dx:g.dx,dy:g.dy,nx,ny};
    else return;
  }
  g.dx=best.dx;g.dy=best.dy;g.x=best.nx;g.y=best.ny;
  g.px=g.x*T;g.py=g.y*T;

  if(g.eaten&&g.x===10&&g.y===10){g.eaten=false;g.scared=false;}
}

function tick(){
  animFrame++;
  // Move player
  const nd=nextDir;
  const ntx=wrapX(player.x+nd.dx),nty=player.y+nd.dy;
  if((nd.dx||nd.dy)&&canMove(ntx,nty)){player.dx=nd.dx;player.dy=nd.dy;}

  if(player.dx||player.dy){
    const mx=wrapX(player.x+player.dx),my=player.y+player.dy;
    if(canMove(mx,my)){player.x=mx;player.y=my;player.px=player.x*T;player.py=player.y*T;}
  }

  // Eat dot
  const cell=map[player.y]&&map[player.y][player.x];
  if(cell===1){map[player.y][player.x]=3;score+=10;dots--;}
  else if(cell===2){map[player.y][player.x]=3;score+=50;dots--;powerTimer=360+level*(-20);eatCombo=0;
    ghosts.forEach(g=>{if(!g.eaten)g.scared=true;});
  }

  if(powerTimer>0){powerTimer--;if(powerTimer<=0)ghosts.forEach(g=>g.scared=false);}

  // Move ghosts
  ghosts.forEach((g,i)=>moveGhost(g,i,animFrame));

  // Collision
  ghosts.forEach(g=>{
    if(Math.abs(g.x-player.x)<=0&&Math.abs(g.y-player.y)<=0){
      if(g.scared&&!g.eaten){g.eaten=true;eatCombo++;score+=200*eatCombo;}
      else if(!g.eaten){
        lives--;
        if(lives<=0){state='over';showOverlay('Game Over','Score: '+score,'Retry');}
        else{state='dead';setTimeout(()=>{resetPositions();state='play';},1000);}
      }
    }
  });

  // Win
  if(dots<=0){level++;state='win';
    setTimeout(()=>{init(level);state='play';},1200);
  }

  updateHUD();
}

function updateHUD(){
  scoreEl.textContent='Score: '+score;
  livesEl.textContent='♥'.repeat(lives);
  levelEl.textContent='Level '+level;
}

function draw(){
  X.fillStyle='#000';X.fillRect(0,0,C.width,C.height);

  // Map
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const v=map[r][c];
    if(v===0){
      X.fillStyle='#1a1aff';X.fillRect(c*T,r*T,T,T);
      X.fillStyle='#2222cc';X.fillRect(c*T+1,r*T+1,T-2,T-2);
    }else if(v===1){
      X.fillStyle='#ffddaa';X.beginPath();X.arc(c*T+T/2,r*T+T/2,2.5,0,Math.PI*2);X.fill();
    }else if(v===2){
      const s=3+Math.sin(animFrame*0.15)*1.5;
      X.fillStyle='#fff';X.beginPath();X.arc(c*T+T/2,r*T+T/2,s,0,Math.PI*2);X.fill();
    }
  }

  // Player
  const mouthAngle=Math.abs(Math.sin(animFrame*0.25))*0.8;
  let angle=0;
  if(player.dx===1)angle=0;else if(player.dx===-1)angle=Math.PI;
  else if(player.dy===-1)angle=-Math.PI/2;else if(player.dy===1)angle=Math.PI/2;
  X.fillStyle='#ffe14d';
  X.beginPath();
  X.arc(player.px+T/2,player.py+T/2,T/2-1,angle+mouthAngle,angle+Math.PI*2-mouthAngle);
  X.lineTo(player.px+T/2,player.py+T/2);
  X.fill();

  // Ghosts
  ghosts.forEach(g=>{
    const gx=g.px+T/2,gy=g.py+T/2;
    let col=g.color;
    if(g.eaten)col='rgba(255,255,255,0.2)';
    else if(g.scared)col=powerTimer<120&&animFrame%20<10?'#fff':'#2222ff';
    X.fillStyle=col;
    X.beginPath();
    X.arc(gx,gy-2,T/2-1,Math.PI,0);
    X.lineTo(gx+T/2-1,gy+T/2-2);
    for(let i=0;i<3;i++){
      const bx=gx+T/2-1-i*(T-2)/3;
      X.lineTo(bx-(T-2)/6,gy+T/2-6);
      X.lineTo(bx-(T-2)/3,gy+T/2-2);
    }
    X.fill();
    if(!g.eaten){
      X.fillStyle='#fff';
      X.beginPath();X.arc(gx-3,gy-3,3,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(gx+3,gy-3,3,0,Math.PI*2);X.fill();
      X.fillStyle=g.scared?'#fff':'#111';
      X.beginPath();X.arc(gx-3+g.dx,gy-3+g.dy,1.5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(gx+3+g.dx,gy-3+g.dy,1.5,0,Math.PI*2);X.fill();
    }
  });

  if(state==='dead'){
    X.fillStyle='rgba(0,0,0,0.4)';X.fillRect(0,0,C.width,C.height);
  }
  if(state==='win'){
    X.fillStyle='rgba(255,255,200,'+(.3+.15*Math.sin(animFrame*.2))+')';X.fillRect(0,0,C.width,C.height);
  }
}

function loop(){
  if(state==='play')tick();
  draw();
  requestAnimationFrame(loop);
}

function showOverlay(title,msg,btn){
  overlay.style.display='flex';
  overlay.querySelector('h1').textContent=title;
  overlay.querySelector('p').textContent=msg;
  startBtn.textContent=btn;
}

function startGame(){
  overlay.style.display='none';
  score=0;lives=3;level=1;state='play';
  init(level);
}

startBtn.onclick=startGame;

// Input
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp')nextDir={dx:0,dy:-1};
  else if(e.key==='ArrowDown')nextDir={dx:0,dy:1};
  else if(e.key==='ArrowLeft')nextDir={dx:-1,dy:0};
  else if(e.key==='ArrowRight')nextDir={dx:1,dy:0};
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
  if(state==='over')startGame();
});

// Mobile controls
document.querySelectorAll('#mobile-controls button').forEach(b=>{
  const d=b.dataset.dir;
  const handler=()=>{
    if(d==='up')nextDir={dx:0,dy:-1};
    else if(d==='down')nextDir={dx:0,dy:1};
    else if(d==='left')nextDir={dx:-1,dy:0};
    else if(d==='right')nextDir={dx:1,dy:0};
    if(state==='over')startGame();
  };
  b.addEventListener('touchstart',e=>{e.preventDefault();handler();});
  b.addEventListener('mousedown',handler);
});

// Swipe
let tx0,ty0;
C.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;});
C.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)+Math.abs(dy)<20)return;
  if(Math.abs(dx)>Math.abs(dy))nextDir={dx:dx>0?1:-1,dy:0};
  else nextDir={dx:0,dy:dy>0?1:-1};
});

state='menu';
loop();
</script>
</body>
</html>
