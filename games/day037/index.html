<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bouncing Ball Physics Sandbox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;touch-action:none}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#ui>*{pointer-events:auto}
#hud{position:absolute;top:12px;left:12px;display:none;font-size:14px;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);padding:10px 16px;border-radius:12px;line-height:1.7}
#hud span{color:#7af}
#toolbar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:none;gap:8px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);padding:8px 12px;border-radius:16px}
#toolbar button{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);color:#fff;padding:8px 14px;border-radius:10px;font-size:13px;cursor:pointer;transition:.2s}
#toolbar button:hover,#toolbar button.active{background:rgba(120,170,255,.25);border-color:#7af}
#startScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#111133 0%,#0a0a1a 70%)}
#startScreen h1{font-size:clamp(28px,6vw,52px);background:linear-gradient(135deg,#7af,#f7a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
#startScreen p{max-width:420px;text-align:center;color:#aab;font-size:clamp(13px,2.5vw,16px);line-height:1.6;margin-bottom:28px;padding:0 20px}
#startBtn{background:linear-gradient(135deg,#4466ff,#8844ff);border:none;color:#fff;padding:14px 40px;border-radius:14px;font-size:18px;cursor:pointer;transition:.2s;box-shadow:0 4px 24px rgba(68,102,255,.4)}
#startBtn:hover{transform:scale(1.05)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    Balls: <span id="ballCount">0</span><br>
    Mode: <span id="modeLabel">Spawn</span><br>
    Gravity: <span id="gravLabel">On</span>
  </div>
  <div id="toolbar">
    <button class="active" data-mode="spawn">🟢 Spawn</button>
    <button data-mode="drag">✋ Drag</button>
    <button data-mode="wall">🧱 Wall</button>
    <button data-mode="gravity">⬇️ Gravity</button>
    <button data-mode="clear">🗑️ Clear</button>
  </div>
  <div id="startScreen">
    <h1>Physics Sandbox</h1>
    <p>Click or tap to spawn bouncing balls. Draw walls, drag balls around, and toggle gravity. Watch them collide and interact!</p>
    <button id="startBtn">Start Playing</button>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const hud=document.getElementById('hud'),toolbar=document.getElementById('toolbar');
const ballCountEl=document.getElementById('ballCount'),modeEl=document.getElementById('modeLabel'),gravEl=document.getElementById('gravLabel');
let W,H,dpr;
function resize(){dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}
resize();window.addEventListener('resize',resize);

let mode='spawn',gravity=true,running=false;
const GRAVITY=980,DAMPING=.75,FRICTION=.995,MAX_BALLS=200;
const balls=[],walls=[];
let dragBall=null,wallStart=null,mousePos={x:0,y:0};

const COLORS=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bdf','#ffa94d','#74c0fc','#b197fc','#63e6be','#ff8787'];

class Ball{
  constructor(x,y,vx,vy,r){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.r=r||Math.random()*12+8;
    this.color=COLORS[Math.random()*COLORS.length|0];
    this.trail=[];
  }
  update(dt){
    if(gravity)this.vy+=GRAVITY*dt;
    this.vx*=FRICTION;this.vy*=FRICTION;
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    // walls
    if(this.x-this.r<0){this.x=this.r;this.vx*=-DAMPING}
    if(this.x+this.r>W){this.x=W-this.r;this.vx*=-DAMPING}
    if(this.y-this.r<0){this.y=this.r;this.vy*=-DAMPING}
    if(this.y+this.r>H){this.y=H-this.r;this.vy*=-DAMPING}
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12)this.trail.shift();
  }
  draw(){
    // trail
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],a=i/this.trail.length*.3;
      ctx.beginPath();ctx.arc(t.x,t.y,this.r*(i/this.trail.length),0,Math.PI*2);
      ctx.fillStyle=this.color.slice(0,-1)+','+a+')'.replace('#',`rgba(${parseInt(this.color.slice(1,3),16)},${parseInt(this.color.slice(3,5),16)},${parseInt(this.color.slice(5,7),16)},`);
      // simpler approach
      ctx.globalAlpha=a;ctx.fillStyle=this.color;ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.color;ctx.fill();
    ctx.beginPath();ctx.arc(this.x-this.r*.3,this.y-this.r*.3,this.r*.25,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fill();
  }
}

function ballCollisions(){
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      const a=balls[i],b=balls[j];
      const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy);
      const minD=a.r+b.r;
      if(dist<minD&&dist>0){
        const nx=dx/dist,ny=dy/dist;
        const overlap=(minD-dist)/2;
        a.x-=nx*overlap;a.y-=ny*overlap;
        b.x+=nx*overlap;b.y+=ny*overlap;
        const dvx=a.vx-b.vx,dvy=a.vy-b.vy;
        const dvn=dvx*nx+dvy*ny;
        if(dvn>0){
          const ma=a.r*a.r,mb=b.r*b.r,total=ma+mb;
          a.vx-=dvn*nx*2*mb/total*DAMPING;
          a.vy-=dvn*ny*2*mb/total*DAMPING;
          b.vx+=dvn*nx*2*ma/total*DAMPING;
          b.vy+=dvn*ny*2*ma/total*DAMPING;
        }
      }
    }
  }
}

function wallCollision(ball,w){
  const wx=w.x2-w.x1,wy=w.y2-w.y1;
  const len=Math.sqrt(wx*wx+wy*wy);if(len===0)return;
  const nx=-wy/len,ny=wx/len;
  const dx=ball.x-w.x1,dy=ball.y-w.y1;
  const dist=dx*nx+dy*ny;
  if(Math.abs(dist)<ball.r){
    const proj=(dx*(wx/len)+dy*(wy/len));
    if(proj>=0&&proj<=len){
      const pen=ball.r-Math.abs(dist);
      const sign=dist>0?1:-1;
      ball.x+=nx*pen*sign;ball.y+=ny*pen*sign;
      const vn=ball.vx*nx*sign+ball.vy*ny*sign;
      if(vn<0){
        ball.vx-=2*vn*nx*sign*DAMPING;
        ball.vy-=2*vn*ny*sign*DAMPING;
      }
    }
  }
}

function update(dt){
  dt=Math.min(dt,.033);
  for(const b of balls){
    if(b===dragBall)continue;
    b.update(dt);
    for(const w of walls)wallCollision(b,w);
  }
  ballCollisions();
  ballCountEl.textContent=balls.length;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  // walls
  ctx.strokeStyle='#556';ctx.lineWidth=4;ctx.lineCap='round';
  for(const w of walls){ctx.beginPath();ctx.moveTo(w.x1,w.y1);ctx.lineTo(w.x2,w.y2);ctx.stroke()}
  // wall preview
  if(mode==='wall'&&wallStart){
    ctx.strokeStyle='rgba(120,170,255,.5)';ctx.setLineDash([8,6]);
    ctx.beginPath();ctx.moveTo(wallStart.x,wallStart.y);ctx.lineTo(mousePos.x,mousePos.y);ctx.stroke();
    ctx.setLineDash([]);
  }
  for(const b of balls)b.draw();
}

let last=0;
function loop(t){
  if(!running){requestAnimationFrame(loop);return}
  const dt=(t-last)/1000;last=t;
  update(dt);draw();
  requestAnimationFrame(loop);
}

// input
function getPos(e){
  const t=e.touches?e.touches[0]:e;
  return{x:t.clientX,y:t.clientY};
}
function findBall(x,y){return balls.find(b=>{const dx=b.x-x,dy=b.y-y;return dx*dx+dy*dy<(b.r+10)*(b.r+10)})}

function onDown(e){
  const p=getPos(e);mousePos=p;
  if(mode==='spawn'&&balls.length<MAX_BALLS){
    balls.push(new Ball(p.x,p.y,(Math.random()-.5)*300,(Math.random()-.5)*300));
  }else if(mode==='drag'){
    dragBall=findBall(p.x,p.y);
  }else if(mode==='wall'){
    wallStart={x:p.x,y:p.y};
  }
}
function onMove(e){
  const p=getPos(e);mousePos=p;
  if(dragBall){dragBall.vx=(p.x-dragBall.x)*10;dragBall.vy=(p.y-dragBall.y)*10;dragBall.x=p.x;dragBall.y=p.y}
}
function onUp(e){
  if(mode==='wall'&&wallStart){
    const dx=mousePos.x-wallStart.x,dy=mousePos.y-wallStart.y;
    if(dx*dx+dy*dy>400)walls.push({x1:wallStart.x,y1:wallStart.y,x2:mousePos.x,y2:mousePos.y});
    wallStart=null;
  }
  if(dragBall)dragBall=null;
}

canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e)},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();onUp(e)},{passive:false});

// toolbar
document.querySelectorAll('#toolbar button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const m=btn.dataset.mode;
    if(m==='clear'){balls.length=0;walls.length=0;return}
    if(m==='gravity'){gravity=!gravity;gravEl.textContent=gravity?'On':'Off';return}
    mode=m;modeEl.textContent=btn.textContent;
    document.querySelectorAll('#toolbar button').forEach(b=>b.classList.remove('active'));
    if(m!=='clear'&&m!=='gravity')btn.classList.add('active');
  });
});

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('startScreen').style.display='none';
  hud.style.display='block';toolbar.style.display='flex';
  running=true;last=performance.now();
});

requestAnimationFrame(loop);
</script>
</body>
</html>
