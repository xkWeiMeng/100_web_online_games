<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Memory Match</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f0e17;--surface:#1a1929;--card:#252438;--card-flip:#3a2d6e;
    --accent:#7f5af0;--accent2:#e056a0;--text:#fffffe;--text-dim:#94a1b2;
    --success:#2cb67d;--gold:#ffd803;
  }
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden;
    background-image:radial-gradient(ellipse at 20% 50%,rgba(127,90,240,.08) 0%,transparent 50%),
                     radial-gradient(ellipse at 80% 20%,rgba(224,86,160,.06) 0%,transparent 50%);
  }

  /* ── Title Screen ── */
  #title-screen{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;text-align:center;padding:2rem;gap:1.5rem;
    animation:fadeIn .6s ease;
  }
  #title-screen h1{
    font-size:clamp(2rem,6vw,3.5rem);font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  #title-screen .emoji-row{font-size:clamp(2rem,5vw,3rem);letter-spacing:.3em;margin:.5rem 0}
  #title-screen .instructions{
    max-width:420px;color:var(--text-dim);font-size:.95rem;line-height:1.6;
    background:var(--surface);border-radius:16px;padding:1.25rem 1.5rem;
    border:1px solid rgba(127,90,240,.15);
  }
  #title-screen .instructions h3{color:var(--text);margin-bottom:.5rem;font-size:1.05rem}
  .difficulty-select{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center}
  .diff-btn{
    padding:.65rem 1.4rem;border-radius:12px;border:2px solid var(--accent);
    background:transparent;color:var(--accent);font-size:.95rem;font-weight:600;
    cursor:pointer;transition:all .2s;
  }
  .diff-btn:hover,.diff-btn.active{background:var(--accent);color:#fff}
  .diff-btn span{display:block;font-size:.7rem;font-weight:400;opacity:.7;margin-top:2px}
  .start-btn{
    padding:.9rem 3rem;border-radius:50px;border:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;font-size:1.15rem;font-weight:700;cursor:pointer;
    transition:transform .2s,box-shadow .2s;
    box-shadow:0 4px 24px rgba(127,90,240,.35);
  }
  .start-btn:hover{transform:scale(1.05);box-shadow:0 6px 32px rgba(127,90,240,.5)}

  /* ── Game Screen ── */
  #game-screen{display:none;flex-direction:column;align-items:center;width:100%;padding:1rem;max-width:640px}

  /* Top bar */
  .top-bar{
    display:flex;justify-content:space-between;align-items:center;width:100%;
    padding:.75rem 1rem;background:var(--surface);border-radius:14px;
    margin-bottom:1rem;border:1px solid rgba(127,90,240,.1);flex-wrap:wrap;gap:.5rem;
  }
  .stat{display:flex;flex-direction:column;align-items:center;min-width:60px}
  .stat .label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim)}
  .stat .value{font-size:1.3rem;font-weight:700;color:var(--gold)}
  .stat .value.time{color:var(--accent)}
  .stat .value.moves{color:var(--accent2)}

  /* Grid */
  .grid{
    display:grid;gap:8px;width:100%;max-width:560px;
    perspective:1000px;margin:0 auto;
  }
  .grid.g4{grid-template-columns:repeat(4,1fr)}
  .grid.g5{grid-template-columns:repeat(5,1fr)}
  .grid.g6{grid-template-columns:repeat(6,1fr)}

  /* Card */
  .card{
    aspect-ratio:1;position:relative;cursor:pointer;
    transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,.2,.2,1);
    border-radius:14px;
  }
  .card.flipped{transform:rotateY(180deg)}
  .card.matched{pointer-events:none}
  .card.matched .card-front{
    background:rgba(44,182,125,.15);border-color:var(--success);
    box-shadow:0 0 20px rgba(44,182,125,.2);
  }
  .card-face{
    position:absolute;inset:0;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    transition:box-shadow .3s;
  }
  .card-back{
    background:linear-gradient(145deg,var(--card),var(--card-flip));
    border:2px solid rgba(127,90,240,.2);
    font-size:clamp(1.2rem,3vw,1.6rem);color:var(--accent);
  }
  .card-back::after{content:'?';opacity:.5;font-weight:700}
  .card:not(.flipped):not(.matched):hover .card-back{
    border-color:var(--accent);box-shadow:0 0 16px rgba(127,90,240,.25);
  }
  .card-front{
    background:var(--surface);border:2px solid rgba(127,90,240,.15);
    transform:rotateY(180deg);
    font-size:clamp(1.8rem,5vw,2.8rem);
  }

  /* Match animation */
  @keyframes matchPop{
    0%{transform:rotateY(180deg) scale(1)}
    50%{transform:rotateY(180deg) scale(1.15)}
    100%{transform:rotateY(180deg) scale(1)}
  }
  .card.match-anim{animation:matchPop .4s ease}

  /* Bottom buttons */
  .bottom-bar{
    display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap;justify-content:center;
  }
  .btn-sm{
    padding:.55rem 1.2rem;border-radius:10px;border:1.5px solid var(--accent);
    background:transparent;color:var(--accent);font-size:.85rem;font-weight:600;
    cursor:pointer;transition:all .2s;
  }
  .btn-sm:hover{background:var(--accent);color:#fff}

  /* ── Win Overlay ── */
  #win-overlay{
    display:none;position:fixed;inset:0;z-index:100;
    background:rgba(15,14,23,.85);backdrop-filter:blur(8px);
    flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:2rem;
  }
  #win-overlay.show{display:flex}
  .win-box{
    background:var(--surface);border-radius:24px;padding:2.5rem;max-width:380px;
    border:1px solid rgba(127,90,240,.2);animation:fadeIn .5s ease;
  }
  .win-box h2{font-size:1.8rem;margin-bottom:.25rem}
  .win-box .trophy{font-size:4rem;margin-bottom:.5rem}
  .win-stars{font-size:2rem;letter-spacing:.3em;margin:.5rem 0}
  .win-stats{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;
    margin:1.25rem 0;
  }
  .win-stat{
    background:rgba(127,90,240,.08);border-radius:12px;padding:.75rem .5rem;
  }
  .win-stat .ws-val{font-size:1.4rem;font-weight:700;color:var(--gold)}
  .win-stat .ws-lbl{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .win-actions{display:flex;gap:.75rem;justify-content:center;margin-top:1.25rem;flex-wrap:wrap}

  /* Combo indicator */
  .combo-toast{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    font-size:2rem;font-weight:800;pointer-events:none;z-index:50;
    color:var(--gold);text-shadow:0 0 20px rgba(255,216,3,.4);
    transition:none;opacity:0;
  }
  .combo-toast.show{
    animation:comboIn .7s ease forwards;
  }
  @keyframes comboIn{
    0%{transform:translate(-50%,-50%) scale(0);opacity:0}
    30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}
    100%{transform:translate(-50%,-60%) scale(1);opacity:0}
  }

  /* Particles */
  .particle{
    position:fixed;pointer-events:none;z-index:60;border-radius:50%;
    animation:particleFly 1s ease-out forwards;
  }
  @keyframes particleFly{
    0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}
  }

  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  /* Responsive */
  @media(max-width:480px){
    .grid{gap:5px}
    .card{border-radius:10px}
    .card-face{border-radius:10px}
    .top-bar{padding:.5rem .75rem}
    .stat .value{font-size:1.1rem}
    #game-screen{padding:.5rem}
  }
</style>
</head>
<body>

<!-- ═══ TITLE SCREEN ═══ -->
<div id="title-screen">
  <div class="emoji-row">🧠 🃏 ✨</div>
  <h1>Emoji Memory Match</h1>
  <div class="instructions">
    <h3>How to Play</h3>
    Flip two cards at a time to find matching emoji pairs. Remember where each emoji is hidden!
    Match all pairs to win. Fewer moves = higher score. Consecutive matches earn combo bonuses!
  </div>
  <div class="difficulty-select">
    <button class="diff-btn active" data-size="4" data-pairs="8">
      Easy<span>4 &times; 4</span>
    </button>
    <button class="diff-btn" data-size="4" data-pairs="10">
      Medium<span>4 &times; 5</span>
    </button>
    <button class="diff-btn" data-size="6" data-pairs="18">
      Hard<span>6 &times; 6</span>
    </button>
  </div>
  <button class="start-btn" id="start-btn">Start Game</button>
</div>

<!-- ═══ GAME SCREEN ═══ -->
<div id="game-screen">
  <div class="top-bar">
    <div class="stat"><span class="label">Pairs</span><span class="value" id="pairs-val">0 / 8</span></div>
    <div class="stat"><span class="label">Moves</span><span class="value moves" id="moves-val">0</span></div>
    <div class="stat"><span class="label">Score</span><span class="value" id="score-val">0</span></div>
    <div class="stat"><span class="label">Time</span><span class="value time" id="time-val">0:00</span></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="bottom-bar">
    <button class="btn-sm" id="restart-btn">Restart</button>
    <button class="btn-sm" id="menu-btn">Menu</button>
  </div>
</div>

<!-- ═══ WIN OVERLAY ═══ -->
<div id="win-overlay">
  <div class="win-box">
    <div class="trophy">🏆</div>
    <h2>You Win!</h2>
    <div class="win-stars" id="win-stars"></div>
    <div class="win-stats">
      <div class="win-stat"><div class="ws-val" id="ws-score">0</div><div class="ws-lbl">Score</div></div>
      <div class="win-stat"><div class="ws-val" id="ws-moves">0</div><div class="ws-lbl">Moves</div></div>
      <div class="win-stat"><div class="ws-val" id="ws-time">0:00</div><div class="ws-lbl">Time</div></div>
    </div>
    <div class="win-actions">
      <button class="start-btn" id="play-again-btn" style="font-size:1rem;padding:.7rem 2rem">Play Again</button>
      <button class="btn-sm" id="win-menu-btn">Menu</button>
    </div>
  </div>
</div>

<div class="combo-toast" id="combo-toast"></div>

<script>
(() => {
  /* ── Emoji pools ── */
  const EMOJI_POOL = [
    '🐶','🐱','🐼','🦊','🐸','🦁','🐯','🐨','🐵','🐷',
    '🦄','🐙','🦋','🐝','🐢','🦀','🐬','🐳','🦈','🐘',
    '🍎','🍊','🍋','🍇','🍓','🍒','🍑','🥝','🍕','🍔',
    '🎸','🎺','🥁','🎻','🎹','🎮','🎲','🎯','🏀','⚽',
    '🚀','✈️','🚁','🏎️','🛸','🌈','⭐','🔥','💎','🎪'
  ];

  /* ── State ── */
  let selectedDifficulty = { cols: 4, rows: 4, pairs: 8 };
  let cards = [], flipped = [], matched = 0, moves = 0, score = 0;
  let combo = 0, timer = null, seconds = 0, locked = false, totalPairs = 8;
  let bestScores = JSON.parse(localStorage.getItem('emoji_mem_best') || '{}');

  /* ── DOM refs ── */
  const $ = id => document.getElementById(id);
  const titleScreen = $('title-screen'), gameScreen = $('game-screen');
  const winOverlay = $('win-overlay'), grid = $('grid');
  const pairsVal = $('pairs-val'), movesVal = $('moves-val');
  const scoreVal = $('score-val'), timeVal = $('time-val');
  const comboToast = $('combo-toast');

  /* ── Difficulty buttons ── */
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const pairs = +btn.dataset.pairs;
      const size = +btn.dataset.size;
      const totalCards = pairs * 2;
      const rows = Math.ceil(totalCards / size);
      selectedDifficulty = { cols: size, rows, pairs };
    });
  });

  /* ── Start / Restart / Menu ── */
  $('start-btn').addEventListener('click', startGame);
  $('restart-btn').addEventListener('click', startGame);
  $('play-again-btn').addEventListener('click', startGame);
  $('menu-btn').addEventListener('click', goMenu);
  $('win-menu-btn').addEventListener('click', goMenu);

  function goMenu() {
    clearInterval(timer);
    gameScreen.style.display = 'none';
    winOverlay.classList.remove('show');
    titleScreen.style.display = 'flex';
  }

  /* ── Core Game ── */
  function startGame() {
    titleScreen.style.display = 'none';
    winOverlay.classList.remove('show');
    gameScreen.style.display = 'flex';

    const { cols, rows, pairs } = selectedDifficulty;
    totalPairs = pairs;
    matched = 0; moves = 0; score = 0; combo = 0; seconds = 0;
    flipped = []; locked = false;
    updateUI();

    /* set grid class */
    grid.className = 'grid g' + cols;

    /* pick emojis */
    const shuffled = [...EMOJI_POOL].sort(() => Math.random() - .5);
    const chosen = shuffled.slice(0, pairs);
    const deck = [...chosen, ...chosen].sort(() => Math.random() - .5);
    cards = deck;

    /* render */
    grid.innerHTML = '';
    deck.forEach((emoji, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = i;
      card.innerHTML = `
        <div class="card-face card-back"></div>
        <div class="card-face card-front">${emoji}</div>
      `;
      card.addEventListener('click', () => flipCard(card, i));
      grid.appendChild(card);
    });

    /* adjust rows */
    grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

    /* start timer */
    clearInterval(timer);
    timer = setInterval(() => { seconds++; timeVal.textContent = fmtTime(seconds); }, 1000);
  }

  function flipCard(cardEl, index) {
    if (locked || cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
    if (flipped.length >= 2) return;

    cardEl.classList.add('flipped');
    flipped.push({ el: cardEl, index });

    if (flipped.length === 2) {
      moves++;
      locked = true;
      const [a, b] = flipped;

      if (cards[a.index] === cards[b.index]) {
        /* Match */
        combo++;
        matched++;
        const bonus = combo > 1 ? combo * 25 : 0;
        const pts = 100 + bonus;
        score += pts;
        updateUI();

        if (combo > 1) showCombo(combo);
        spawnParticles(a.el); spawnParticles(b.el);

        setTimeout(() => {
          a.el.classList.add('matched', 'match-anim');
          b.el.classList.add('matched', 'match-anim');
          flipped = [];
          locked = false;

          if (matched === totalPairs) {
            clearInterval(timer);
            setTimeout(showWin, 600);
          }
        }, 350);
      } else {
        /* No match */
        combo = 0;
        setTimeout(() => {
          a.el.classList.remove('flipped');
          b.el.classList.remove('flipped');
          flipped = [];
          locked = false;
        }, 800);
      }
      movesVal.textContent = moves;
    }
  }

  function updateUI() {
    pairsVal.textContent = `${matched} / ${totalPairs}`;
    movesVal.textContent = moves;
    scoreVal.textContent = score;
    timeVal.textContent = fmtTime(seconds);
  }

  function fmtTime(s) {
    const m = Math.floor(s / 60);
    return m + ':' + String(s % 60).padStart(2, '0');
  }

  /* ── Combo Toast ── */
  function showCombo(n) {
    comboToast.textContent = `${n}x Combo!`;
    comboToast.classList.remove('show');
    void comboToast.offsetWidth;
    comboToast.classList.add('show');
  }

  /* ── Win Screen ── */
  function showWin() {
    /* star rating: 3 stars = under 1.5× optimal moves, 2 stars = under 2.5×, 1 star = else */
    const optimal = totalPairs;
    const ratio = moves / optimal;
    const stars = ratio <= 1.8 ? 3 : ratio <= 3 ? 2 : 1;
    /* time bonus */
    const timeBonus = Math.max(0, (totalPairs * 30 - seconds) * 5);
    score += timeBonus;

    /* save best */
    const key = `${totalPairs}`;
    if (!bestScores[key] || score > bestScores[key]) {
      bestScores[key] = score;
      localStorage.setItem('emoji_mem_best', JSON.stringify(bestScores));
    }

    $('ws-score').textContent = score;
    $('ws-moves').textContent = moves;
    $('ws-time').textContent = fmtTime(seconds);
    $('win-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

    winOverlay.classList.add('show');
  }

  /* ── Particles ── */
  function spawnParticles(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const colors = ['#7f5af0','#e056a0','#2cb67d','#ffd803','#ff6b6b'];
    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 4 + Math.random() * 6;
      const angle = Math.random() * Math.PI * 2;
      const dist = 40 + Math.random() * 60;
      p.style.cssText = `
        left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;
        background:${colors[i % colors.length]};
        --dx:${Math.cos(angle) * dist}px;--dy:${Math.sin(angle) * dist}px;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }
  }
})();
</script>
</body>
</html>
