<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon Says</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;font-family:'Segoe UI',system-ui,sans-serif;color:#eee;user-select:none}
h1{font-size:2.4rem;margin-bottom:.3rem;background:linear-gradient(135deg,#e94560,#0f3460);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#subtitle{font-size:.95rem;color:#888;margin-bottom:1.2rem}
#board{position:relative;width:320px;height:320px;border-radius:50%;overflow:hidden;box-shadow:0 0 40px rgba(233,69,96,.25);opacity:.5;pointer-events:none;transition:opacity .3s}
#board.active{opacity:1;pointer-events:auto}
.pad{position:absolute;width:50%;height:50%;cursor:pointer;transition:filter .1s,transform .1s;filter:brightness(.55)}
.pad:active,.pad.lit{filter:brightness(1);transform:scale(.97)}
#green{top:0;left:0;background:#2ecc71;border-radius:100% 0 0 0}
#red{top:0;right:0;background:#e74c3c;border-radius:0 100% 0 0}
#yellow{bottom:0;left:0;background:#f1c40f;border-radius:0 0 0 100%}
#blue{bottom:0;right:0;background:#3498db;border-radius:0 0 100% 0}
#center{position:absolute;width:38%;height:38%;top:31%;left:31%;background:#1a1a2e;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:inset 0 0 20px rgba(0,0,0,.5)}
#center span{font-size:1.6rem;font-weight:700}
#info{margin-top:1.4rem;text-align:center;min-height:3.2rem}
#startBtn{padding:.7rem 2.2rem;font-size:1.1rem;border:none;border-radius:2rem;background:linear-gradient(135deg,#e94560,#0f3460);color:#fff;cursor:pointer;transition:transform .15s}
#startBtn:hover{transform:scale(1.06)}
#score{font-size:1.05rem;color:#aaa;margin-top:.4rem}
#instructions{max-width:340px;text-align:center;font-size:.85rem;color:#666;margin-top:1rem;line-height:1.5}
</style>
</head>
<body>
<h1>Simon Says</h1>
<p id="subtitle">Color Memory Challenge</p>
<div id="board">
  <div class="pad" id="green" data-i="0"></div>
  <div class="pad" id="red" data-i="1"></div>
  <div class="pad" id="yellow" data-i="2"></div>
  <div class="pad" id="blue" data-i="3"></div>
  <div id="center"><span id="level">—</span></div>
</div>
<div id="info"><button id="startBtn">Start Game</button></div>
<p id="score"></p>
<p id="instructions">Watch the sequence, then repeat it.<br>Each round adds one more color. How far can you go?</p>

<script>
const pads=document.querySelectorAll('.pad'),board=document.getElementById('board'),
  levelEl=document.getElementById('level'),info=document.getElementById('info'),
  scoreEl=document.getElementById('score'),startBtn=document.getElementById('startBtn');

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
const freqs=[329.63,261.63,220,164.81];

function beep(i,dur=.3){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.frequency.value=freqs[i];o.type='sine';
  g.gain.setValueAtTime(.25,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function failBeep(){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.frequency.value=100;o.type='sawtooth';
  g.gain.setValueAtTime(.3,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.6);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.6);
}

let seq=[],playerIdx=0,playing=false,best=0;

function flash(i,dur=400){
  return new Promise(r=>{pads[i].classList.add('lit');beep(i,dur/1000);setTimeout(()=>{pads[i].classList.remove('lit');setTimeout(r,100)},dur)});
}

async function playSeq(){
  playing=true;board.classList.remove('active');
  const speed=Math.max(250,500-seq.length*15);
  for(const i of seq)await flash(i,speed);
  board.classList.add('active');playing=false;playerIdx=0;
}

function addRound(){
  seq.push(Math.floor(Math.random()*4));
  levelEl.textContent=seq.length;
  scoreEl.textContent=`Round ${seq.length} · Best: ${best}`;
  playSeq();
}

async function gameOver(){
  playing=true;board.classList.remove('active');
  failBeep();
  if(seq.length-1>best)best=seq.length-1;
  scoreEl.textContent=`Score: ${seq.length-1} · Best: ${best}`;
  // flash all
  pads.forEach(p=>p.classList.add('lit'));
  await new Promise(r=>setTimeout(r,800));
  pads.forEach(p=>p.classList.remove('lit'));
  info.innerHTML='<button id="startBtn" onclick="startGame()">Play Again</button>';
  info.querySelector('#startBtn').style.cssText='padding:.7rem 2.2rem;font-size:1.1rem;border:none;border-radius:2rem;background:linear-gradient(135deg,#e94560,#0f3460);color:#fff;cursor:pointer';
  levelEl.textContent='✗';playing=false;
}

function handlePad(i){
  if(playing)return;
  if(parseInt(i)===seq[playerIdx]){
    flash(i,200);playerIdx++;
    if(playerIdx===seq.length){playing=true;setTimeout(addRound,600);}
  }else{gameOver();}
}

pads.forEach(p=>{
  p.addEventListener('pointerdown',e=>{e.preventDefault();handlePad(p.dataset.i)});
});

function startGame(){
  seq=[];playerIdx=0;info.innerHTML='';levelEl.textContent='—';
  audioCtx.resume();
  setTimeout(addRound,500);
}
startBtn.onclick=startGame;
</script>
</body>
</html>
