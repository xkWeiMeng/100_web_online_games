<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Four</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
h1{font-size:2.2rem;margin-bottom:.3rem;background:linear-gradient(135deg,#f43f5e,#eab308);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.85rem;color:#94a3b8;margin-bottom:1rem}
#screen-title,#screen-game,#screen-over{display:none;flex-direction:column;align-items:center}
.active{display:flex!important}
button{font-family:inherit;font-size:1rem;padding:.6rem 1.6rem;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:transform .1s,box-shadow .15s}
button:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 4px 14px #3b82f644}
.btn-primary:hover{box-shadow:0 6px 20px #3b82f666}
.btn-sm{font-size:.85rem;padding:.45rem 1rem}
.diff-btns{display:flex;gap:.6rem;margin:.8rem 0 1.2rem}
.diff-btns button{background:#1e293b;color:#94a3b8;border:2px solid #334155}
.diff-btns button.sel{border-color:#6366f1;color:#e2e8f0;background:#1e293b}
.instructions{max-width:340px;text-align:center;color:#94a3b8;font-size:.82rem;line-height:1.5;margin-bottom:1.2rem}
.board-wrap{position:relative;margin:0 auto}
.board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:linear-gradient(180deg,#1e40af,#1e3a8a);padding:10px;border-radius:14px;box-shadow:0 8px 30px #0008}
.cell{width:clamp(38px,11vw,62px);height:clamp(38px,11vw,62px);background:#0f172a;border-radius:50%;cursor:pointer;transition:background .15s,box-shadow .15s;position:relative}
.cell:hover{background:#1e293b}
.cell.r{background:radial-gradient(circle at 35% 35%,#fb7185,#e11d48);box-shadow:inset 0 -3px 6px #88001a55}
.cell.y{background:radial-gradient(circle at 35% 35%,#fde047,#eab308);box-shadow:inset 0 -3px 6px #71560055}
.cell.win{animation:pulse .5s ease infinite alternate}
@keyframes pulse{to{transform:scale(1.12);filter:brightness(1.3)}}
.indicator{display:flex;gap:6px;padding:0 10px;margin-bottom:4px}
.indicator div{width:clamp(38px,11vw,62px);height:8px;border-radius:4px;background:transparent;transition:background .15s}
.status{margin-top:.8rem;font-size:1.05rem;font-weight:600;height:1.6rem}
.scores{display:flex;gap:2rem;margin-top:.4rem;font-size:.9rem}
.scores span{padding:.2rem .7rem;border-radius:6px;background:#1e293b}
.sr{color:#f43f5e}.sy{color:#eab308}
#screen-over h2{font-size:1.8rem;margin-bottom:.5rem}
#screen-over .result{font-size:1.1rem;margin-bottom:1.2rem;color:#94a3b8}
.btns-row{display:flex;gap:.6rem;margin-top:.6rem}
</style>
</head>
<body>

<div id="screen-title" class="active">
  <h1>Connect Four</h1>
  <p class="sub">You vs AI</p>
  <div class="instructions">Drop your discs into the grid. First to connect four in a row — horizontally, vertically, or diagonally — wins!</div>
  <label style="color:#94a3b8;font-size:.85rem">Difficulty</label>
  <div class="diff-btns">
    <button data-d="3" class="btn-sm">Easy</button>
    <button data-d="5" class="btn-sm sel">Medium</button>
    <button data-d="7" class="btn-sm">Hard</button>
  </div>
  <button class="btn-primary" onclick="startGame()">Play</button>
</div>

<div id="screen-game">
  <h1 style="font-size:1.4rem;margin-bottom:0">Connect Four</h1>
  <div class="scores"><span class="sr">You: <b id="s-p">0</b></span><span class="sy">AI: <b id="s-a">0</b></span></div>
  <div class="status" id="status">Your turn</div>
  <div class="board-wrap">
    <div class="indicator" id="indicator"></div>
    <div class="board" id="board"></div>
  </div>
  <div class="btns-row">
    <button class="btn-sm btn-primary" onclick="resetBoard()">New Game</button>
    <button class="btn-sm" style="background:#1e293b;color:#94a3b8" onclick="goTitle()">Menu</button>
  </div>
</div>

<div id="screen-over">
  <h2 id="over-title">Game Over</h2>
  <div class="result" id="over-msg"></div>
  <button class="btn-primary" onclick="resetBoard()">Play Again</button>
</div>

<script>
const ROWS=6,COLS=7;
let board,turn,gameOver,depth,scores={p:0,a:0};

document.querySelectorAll('.diff-btns button').forEach(b=>{
  b.onclick=()=>{document.querySelector('.diff-btns .sel')?.classList.remove('sel');b.classList.add('sel');};
});

function show(id){document.querySelectorAll('#screen-title,#screen-game,#screen-over').forEach(e=>e.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goTitle(){show('screen-title');}

function startGame(){
  depth=+document.querySelector('.diff-btns .sel').dataset.d;
  scores={p:0,a:0};updateScores();resetBoard();
}

function resetBoard(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  turn=1;gameOver=false;
  show('screen-game');
  renderBoard();
  document.getElementById('status').textContent='Your turn';
}

function renderBoard(){
  const bEl=document.getElementById('board');
  const indEl=document.getElementById('indicator');
  bEl.innerHTML='';indEl.innerHTML='';
  for(let c=0;c<COLS;c++){const d=document.createElement('div');indEl.appendChild(d);}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=document.createElement('div');
    cell.className='cell'+(board[r][c]===1?' r':'')+(board[r][c]===2?' y':'');
    cell.dataset.c=c;
    cell.addEventListener('click',()=>playerMove(c));
    cell.addEventListener('mouseenter',()=>highlightCol(c));
    cell.addEventListener('mouseleave',()=>highlightCol(-1));
    bEl.appendChild(cell);
  }
}

function highlightCol(c){
  document.querySelectorAll('.indicator div').forEach((d,i)=>{
    d.style.background=(!gameOver&&turn===1&&i===c)?'#e11d48':'transparent';
  });
}

function getCell(r,c){return document.querySelector(`#board .cell:nth-child(${r*COLS+c+1})`);}

function drop(col,player){
  for(let r=ROWS-1;r>=0;r--)if(board[r][col]===0){board[r][col]=player;return r;}
  return -1;
}

function undrop(col){for(let r=0;r<ROWS;r++)if(board[r][col]){board[r][col]=0;return;}}

function checkWin(p){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(const[dr,dc]of dirs){
      let cells=[];let ok=true;
      for(let i=0;i<4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=ROWS||nc<0||nc>=COLS||board[nr][nc]!==p){ok=false;break;}cells.push([nr,nc]);}
      if(ok)return cells;
    }
  }
  return null;
}

function isFull(){return board[0].every(c=>c!==0);}

function playerMove(col){
  if(gameOver||turn!==1)return;
  if(board[0][col]!==0){return;}
  const r=drop(col,1);
  renderBoard();
  const win=checkWin(1);
  if(win){endGame(1,win);return;}
  if(isFull()){endGame(0);return;}
  turn=2;
  document.getElementById('status').textContent='AI thinking...';
  setTimeout(aiMove,300);
}

function aiMove(){
  const col=bestMove();
  drop(col,2);
  renderBoard();
  const win=checkWin(2);
  if(win){endGame(2,win);return;}
  if(isFull()){endGame(0);return;}
  turn=1;
  document.getElementById('status').textContent='Your turn';
}

function endGame(winner,cells){
  gameOver=true;
  if(cells)cells.forEach(([r,c])=>getCell(r,c)?.classList.add('win'));
  if(winner===1){scores.p++;document.getElementById('over-title').textContent='You Win!';document.getElementById('over-msg').textContent='Congratulations!';}
  else if(winner===2){scores.a++;document.getElementById('over-title').textContent='AI Wins';document.getElementById('over-msg').textContent='Better luck next time.';}
  else{document.getElementById('over-title').textContent='Draw';document.getElementById('over-msg').textContent="It's a tie!";}
  updateScores();
  setTimeout(()=>show('screen-over'),800);
}

function updateScores(){document.getElementById('s-p').textContent=scores.p;document.getElementById('s-a').textContent=scores.a;}

// --- AI (Minimax + Alpha-Beta) ---
function score4(a,b,c,d,p){
  const o=p===1?2:1;const arr=[a,b,c,d];
  const pc=arr.filter(x=>x===p).length,ec=arr.filter(x=>x===o).length,em=arr.filter(x=>x===0).length;
  if(pc===4)return 100000;if(pc===3&&em===1)return 50;if(pc===2&&em===2)return 5;
  if(ec===3&&em===1)return -80;if(ec===2&&em===2)return-3;
  return 0;
}

function evaluate(p){
  let s=0;
  // center preference
  for(let r=0;r<ROWS;r++)if(board[r][3]===p)s+=3;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(const[dr,dc]of dirs){
      if(r+dr*3>=ROWS||r+dr*3<0||c+dc*3>=COLS||c+dc*3<0)continue;
      s+=score4(board[r][c],board[r+dr][c+dc],board[r+dr*2][c+dc*2],board[r+dr*3][c+dc*3],p);
    }
  }
  return s;
}

function getValidCols(){const v=[];for(let c=0;c<COLS;c++)if(board[0][c]===0)v.push(c);return v;}

function minimax(d,alpha,beta,maximizing){
  const w1=checkWin(1),w2=checkWin(2);
  if(w2)return[null,100000+d];if(w1)return[null,-100000-d];
  const valid=getValidCols();if(!valid.length)return[null,0];if(d===0)return[null,evaluate(2)-evaluate(1)];
  if(maximizing){
    let best=-Infinity,bestCol=valid[Math.random()*valid.length|0];
    for(const c of valid){drop(c,2);const[,sc]=minimax(d-1,alpha,beta,false);undrop(c);if(sc>best){best=sc;bestCol=c;}alpha=Math.max(alpha,sc);if(alpha>=beta)break;}
    return[bestCol,best];
  }else{
    let best=Infinity,bestCol=valid[Math.random()*valid.length|0];
    for(const c of valid){drop(c,1);const[,sc]=minimax(d-1,alpha,beta,true);undrop(c);if(sc<best){best=sc;bestCol=c;}beta=Math.min(beta,sc);if(alpha>=beta)break;}
    return[bestCol,best];
  }
}

function bestMove(){
  // order columns center-first for better pruning
  const order=[3,2,4,1,5,0,6];
  const valid=order.filter(c=>board[0][c]===0);
  // immediate win/block
  for(const c of valid){drop(c,2);if(checkWin(2)){undrop(c);return c;}undrop(c);}
  for(const c of valid){drop(c,1);if(checkWin(1)){undrop(c);return c;}undrop(c);}
  const[col]=minimax(depth,-Infinity,Infinity,true);
  return col??valid[0];
}
</script>
</body>
</html>
