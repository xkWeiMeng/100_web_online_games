<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Basketball Free Throw Shooter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none}
canvas{display:block;margin:0 auto}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;align-items:center}
#hud{display:none;width:100%;padding:12px 20px;justify-content:space-between;color:#fff;font-size:18px;font-weight:700;text-shadow:0 2px 4px rgba(0,0,0,.5)}
.hud-item{background:rgba(0,0,0,.4);padding:6px 16px;border-radius:20px}
#start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;pointer-events:auto;background:rgba(0,0,0,.6)}
#start-screen h1{font-size:clamp(28px,6vw,52px);color:#ff6b35;text-shadow:0 3px 12px rgba(255,107,53,.5);margin-bottom:8px}
#start-screen p{color:#ccc;font-size:clamp(13px,2.5vw,17px);margin:4px 0;max-width:400px;text-align:center;line-height:1.4}
#start-screen .inst{margin:16px 0;padding:16px 24px;background:rgba(255,255,255,.08);border-radius:12px}
.btn{background:linear-gradient(135deg,#ff6b35,#e84545);color:#fff;border:none;padding:14px 48px;font-size:20px;font-weight:700;border-radius:30px;cursor:pointer;margin-top:20px;pointer-events:auto;box-shadow:0 4px 20px rgba(232,69,69,.4);transition:transform .15s}
.btn:hover{transform:scale(1.05)}
#game-over{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);flex-direction:column;align-items:center;justify-content:center;pointer-events:auto}
#game-over h2{font-size:42px;color:#ff6b35;margin-bottom:8px}
#game-over p{color:#fff;font-size:22px;margin:4px}
#power-bar{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:200px;height:16px;background:rgba(0,0,0,.5);border-radius:8px;border:2px solid rgba(255,255,255,.3)}
#power-fill{height:100%;width:0%;border-radius:6px;background:linear-gradient(90deg,#4ade80,#facc15,#ef4444);transition:none}
#aim-indicator{display:none;position:absolute;color:#fff;font-size:14px;background:rgba(0,0,0,.5);padding:4px 10px;border-radius:10px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud"><span class="hud-item" id="score-display">Score: 0</span><span class="hud-item" id="shots-display">Shots: 0/10</span><span class="hud-item" id="streak-display">Streak: 0</span></div>
  <div id="start-screen">
    <h1>🏀 Free Throw</h1>
    <div class="inst">
      <p><b>How to play:</b></p>
      <p>Drag from the ball to aim and set power.<br>Release to shoot! Make 10 shots count.</p>
      <p style="margin-top:8px;color:#ff6b35">Swish = 3 pts &bull; Regular = 2 pts &bull; Streak bonus!</p>
    </div>
    <button class="btn" id="start-btn">Play Ball!</button>
  </div>
  <div id="game-over">
    <h2 id="go-title">Game Over</h2>
    <p id="go-score"></p>
    <p id="go-detail"></p>
    <button class="btn" id="restart-btn">Play Again</button>
  </div>
</div>
<div id="power-bar"><div id="power-fill"></div></div>
<div id="aim-indicator"></div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,scale;
const COURT_W=800,COURT_H=600;

function resize(){
  const r=Math.min(innerWidth/COURT_W,innerHeight/COURT_H);
  W=Math.floor(COURT_W*r);H=Math.floor(COURT_H*r);
  canvas.width=W;canvas.height=H;scale=r;
}
resize();addEventListener('resize',resize);

// Game state
let state='menu',score=0,shots=0,maxShots=10,streak=0,bestStreak=0;
let ball={x:0,y:0,vx:0,vy:0,r:18,active:false,z:0,vz:0,shadow:1};
let dragging=false,dragStart={x:0,y:0},dragEnd={x:0,y:0};
let particles=[],texts=[],netAnim=0;
const GRAVITY=0.35,BOUNCE=0.6;
const hoopX=400,hoopY=180,hoopZ=200,rimR=28,backboardX=440,backboardY=130;
const ballStart={x:400,y:480};
let ballAngle=0;

function resetBall(){
  ball.x=ballStart.x;ball.y=ballStart.y;ball.vx=0;ball.vy=0;
  ball.active=false;ball.z=0;ball.vz=0;ball.shadow=1;ballAngle=0;
}

function startGame(){
  state='play';score=0;shots=0;streak=0;bestStreak=0;
  particles=[];texts=[];
  resetBall();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-over').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('power-bar').style.display='none';
  updateHUD();
}

function updateHUD(){
  document.getElementById('score-display').textContent='Score: '+score;
  document.getElementById('shots-display').textContent='Shots: '+shots+'/'+maxShots;
  document.getElementById('streak-display').textContent='Streak: '+streak;
}

function showGameOver(){
  state='over';
  document.getElementById('hud').style.display='none';
  const go=document.getElementById('game-over');
  go.style.display='flex';
  const pct=shots>0?Math.round((score/(maxShots*5))*100):0;
  document.getElementById('go-title').textContent=score>=20?'Amazing!':score>=14?'Great Game!':'Game Over';
  document.getElementById('go-score').textContent='Final Score: '+score;
  document.getElementById('go-detail').textContent='Best Streak: '+bestStreak+' | Accuracy: '+pct+'%';
}

function addParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:2+Math.random()*3});
  }
}

function addText(x,y,text,color){
  texts.push({x,y,text,color,life:1,vy:-1.5});
}

function shoot(power,angle){
  ball.vx=Math.cos(angle)*power*0.18;
  ball.vy=Math.sin(angle)*power*0.18;
  ball.vz=power*0.12;
  ball.active=true;
  shots++;
  updateHUD();
}

// Input
function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]||e.changedTouches[0]:e;
  return{x:(t.clientX-rect.left)/scale,y:(t.clientY-rect.top)/scale};
}

function onDown(e){
  if(state!=='play'||ball.active)return;
  const p=getPos(e);
  const dx=p.x-ball.x,dy=p.y-ball.y;
  if(Math.sqrt(dx*dx+dy*dy)<60){
    dragging=true;dragStart=p;dragEnd=p;
    document.getElementById('power-bar').style.display='block';
  }
}
function onMove(e){
  if(!dragging)return;
  e.preventDefault();
  dragEnd=getPos(e);
  const dx=dragStart.x-dragEnd.x,dy=dragStart.y-dragEnd.y;
  const power=Math.min(Math.sqrt(dx*dx+dy*dy),180);
  document.getElementById('power-fill').style.width=(power/180*100)+'%';
}
function onUp(e){
  if(!dragging)return;
  dragging=false;
  document.getElementById('power-bar').style.display='none';
  const dx=dragStart.x-dragEnd.x,dy=dragStart.y-dragEnd.y;
  const power=Math.min(Math.sqrt(dx*dx+dy*dy),180);
  if(power>15){
    const angle=Math.atan2(dy,dx);
    shoot(power,angle);
  }
}

canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
document.getElementById('start-btn').onclick=startGame;
document.getElementById('restart-btn').onclick=startGame;

// Physics & scoring
let scored=false;
function update(){
  if(state!=='play')return;
  if(!ball.active)return;

  ball.vy+=GRAVITY;
  ball.x+=ball.vx;ball.y+=ball.vy;
  ball.z+=ball.vz;ball.vz-=0.15;
  if(ball.z<0){ball.z=0;ball.vz*=-0.3;ball.vx*=0.8;ball.vy*=0.8;}
  ball.shadow=Math.max(0.2,1-ball.z/300);
  ballAngle+=ball.vx*0.05;

  // Depth factor: ball appears smaller as z increases (going "into" screen toward hoop)
  const depthScale=1-ball.z/500;

  // Check rim collision (simplified 2D + z check)
  if(ball.z>100&&ball.z<280){
    const dx=ball.x-hoopX,dy=ball.y-hoopY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    // Rim bounce
    if(dist>rimR-5&&dist<rimR+12&&ball.vy>-2){
      const nx=dx/dist,ny=dy/dist;
      ball.vx+=nx*2;ball.vy+=ny*1.5;
      ball.vx*=0.7;ball.vy*=0.7;
    }
    // Backboard
    if(ball.x>backboardX-5&&ball.x<backboardX+10&&ball.y>backboardY-40&&ball.y<backboardY+50&&ball.z>150&&ball.z<250){
      ball.vx=-ball.vx*0.5;ball.x=backboardX-6;
    }
  }

  // Score detection
  if(!scored&&ball.z>180&&ball.z<220){
    const dx=ball.x-hoopX,dy=ball.y-hoopY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<rimR-8&&ball.vz<0){
      scored=true;
      const isSwish=dist<10;
      const pts=isSwish?3:2;
      const bonus=streak>=2?1:0;
      score+=pts+bonus;streak++;
      if(streak>bestStreak)bestStreak=streak;
      netAnim=1;
      addParticles(hoopX,hoopY+20,'#ff6b35',20);
      addParticles(hoopX,hoopY+20,'#fbbf24',15);
      const label=isSwish?'SWISH! +'+( pts+bonus):'Score! +'+(pts+bonus);
      addText(hoopX,hoopY-20,label,isSwish?'#fbbf24':'#4ade80');
      if(bonus)addText(hoopX,hoopY,'+1 Streak Bonus!','#a78bfa');
      updateHUD();
    }
  }

  // Ball out of bounds or settled
  if(ball.y>COURT_H+50||ball.x<-50||ball.x>COURT_W+50||(ball.z===0&&Math.abs(ball.vy)<0.5&&Math.abs(ball.vx)<0.5&&ball.y>hoopY+50)){
    if(!scored){streak=0;addText(ball.x,ball.y-30,'Miss!','#ef4444');updateHUD();}
    setTimeout(()=>{
      if(shots>=maxShots){showGameOver();}
      else{resetBall();scored=false;}
    },scored?600:400);
    ball.active=false;scored=false;
  }
}

// Drawing
function drawCourt(){
  // Floor
  const floorGrad=ctx.createLinearGradient(0,H*0.4,0,H);
  floorGrad.addColorStop(0,'#c4823a');floorGrad.addColorStop(1,'#8b5e34');
  ctx.fillStyle=floorGrad;
  ctx.fillRect(0,H*0.35,W,H*0.65);

  // Court lines
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2*scale;
  ctx.beginPath();
  ctx.moveTo(W*0.2,H*0.35);ctx.lineTo(W*0.2,H);
  ctx.moveTo(W*0.8,H*0.35);ctx.lineTo(W*0.8,H);
  ctx.stroke();

  // Free throw line
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=3*scale;
  ctx.beginPath();ctx.moveTo(W*0.25,H*0.65);ctx.lineTo(W*0.75,H*0.65);ctx.stroke();

  // Background wall
  const wallGrad=ctx.createLinearGradient(0,0,0,H*0.4);
  wallGrad.addColorStop(0,'#16213e');wallGrad.addColorStop(1,'#1a1a2e');
  ctx.fillStyle=wallGrad;ctx.fillRect(0,0,W,H*0.38);
}

function drawBackboard(){
  const bx=backboardX*scale,by=backboardY*scale;
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillRect(bx-3*scale,by-35*scale,8*scale,70*scale);
  ctx.strokeStyle='#e44';ctx.lineWidth=2*scale;
  ctx.strokeRect(bx-3*scale,(by-15*scale),8*scale,30*scale);
}

function drawHoop(){
  const hx=hoopX*scale,hy=hoopY*scale,rr=rimR*scale;
  // Rim
  ctx.strokeStyle='#ff4444';ctx.lineWidth=4*scale;
  ctx.beginPath();ctx.ellipse(hx,hy,rr,rr*0.35,0,0,Math.PI*2);ctx.stroke();

  // Net
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5*scale;
  const netSway=netAnim>0?Math.sin(netAnim*10)*5*netAnim:0;
  for(let i=0;i<6;i++){
    const angle=-Math.PI+Math.PI*i/5;
    const nx=hx+Math.cos(angle)*rr;
    const ny=hy+Math.sin(angle)*rr*0.35;
    ctx.beginPath();ctx.moveTo(nx,ny);
    ctx.quadraticCurveTo(nx+netSway*scale,ny+20*scale,hx+netSway*scale*0.5,hy+35*scale);
    ctx.stroke();
  }
  if(netAnim>0)netAnim-=0.03;
}

function drawBall(){
  const bx=ball.x*scale,by=ball.y*scale;
  const zScale=1-ball.z/600;
  const r=ball.r*scale*Math.max(0.5,zScale);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,'+0.3*ball.shadow+')';
  ctx.beginPath();ctx.ellipse(bx,by+r*1.2,r*0.9,r*0.3,0,0,Math.PI*2);ctx.fill();

  // Ball
  ctx.save();ctx.translate(bx,by-ball.z*scale*0.3);ctx.rotate(ballAngle);
  const grad=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r);
  grad.addColorStop(0,'#ff8c42');grad.addColorStop(0.7,'#e85d04');grad.addColorStop(1,'#c1440e');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();

  // Lines on ball
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1.5*scale;
  ctx.beginPath();ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(0,r);ctx.stroke();
  ctx.restore();
}

function drawAimLine(){
  if(!dragging)return;
  const dx=dragStart.x-dragEnd.x,dy=dragStart.y-dragEnd.y;
  const power=Math.min(Math.sqrt(dx*dx+dy*dy),180);
  if(power<15)return;
  const angle=Math.atan2(dy,dx);

  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2*scale;
  ctx.setLineDash([8*scale,6*scale]);
  ctx.beginPath();
  ctx.moveTo(ball.x*scale,ball.y*scale);
  const len=power*0.6;
  ctx.lineTo((ball.x+Math.cos(angle)*len)*scale,(ball.y+Math.sin(angle)*len)*scale);
  ctx.stroke();ctx.setLineDash([]);

  // Arrow head
  const ax=(ball.x+Math.cos(angle)*len)*scale,ay=(ball.y+Math.sin(angle)*len)*scale;
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(ax,ay);
  ctx.lineTo(ax-Math.cos(angle-0.4)*12*scale,ay-Math.sin(angle-0.4)*12*scale);
  ctx.lineTo(ax-Math.cos(angle+0.4)*12*scale,ay-Math.sin(angle+0.4)*12*scale);
  ctx.fill();
}

function drawParticles(){
  particles.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=0.02;
    if(p.life<=0){particles.splice(i,1);return;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x*scale,p.y*scale,p.r*scale,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawTexts(){
  texts.forEach((t,i)=>{
    t.y+=t.vy;t.life-=0.015;
    if(t.life<=0){texts.splice(i,1);return;}
    ctx.globalAlpha=t.life;
    ctx.fillStyle=t.color;ctx.font='bold '+Math.floor(22*scale)+'px Segoe UI';ctx.textAlign='center';
    ctx.fillText(t.text,t.x*scale,t.y*scale);
  });
  ctx.globalAlpha=1;
}

function frame(){
  ctx.clearRect(0,0,W,H);
  drawCourt();

  // Draw based on ball z-depth: if ball is behind hoop, draw ball first
  if(ball.z>hoopZ){
    drawBall();drawBackboard();drawHoop();
  } else {
    drawBackboard();drawHoop();drawBall();
  }

  drawAimLine();drawParticles();drawTexts();
  update();
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
