<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fruit Ninja</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a2e;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
#hud{position:absolute;top:0;left:0;width:100%;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;pointer-events:none}
#hud span{color:#fff;font-size:20px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.5)}
#lives{display:flex;gap:6px}
.heart{font-size:24px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
#menu{display:flex;flex-direction:column;align-items:center;gap:20px;pointer-events:auto}
#menu h1{font-size:52px;color:#ff6b35;text-shadow:0 0 30px rgba(255,107,53,.5),0 4px 12px rgba(0,0,0,.5);letter-spacing:2px}
#menu p{color:rgba(255,255,255,.7);font-size:16px;max-width:320px;text-align:center;line-height:1.5}
#menu button{background:linear-gradient(135deg,#ff6b35,#e63946);color:#fff;border:none;padding:14px 48px;font-size:22px;font-weight:700;border-radius:50px;cursor:pointer;box-shadow:0 4px 20px rgba(230,57,70,.4);transition:transform .15s}
#menu button:hover{transform:scale(1.05)}
#gameover{display:none;flex-direction:column;align-items:center;gap:16px;pointer-events:auto}
#gameover h2{font-size:42px;color:#e63946;text-shadow:0 0 20px rgba(230,57,70,.4)}
#gameover .final{font-size:28px;color:#fff}
#gameover .best{font-size:16px;color:rgba(255,255,255,.6)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud" style="display:none">
    <span id="score">0</span>
    <div id="lives"></div>
  </div>
  <div id="menu">
    <h1>🍉 Fruit Ninja</h1>
    <p>Swipe to slice fruits! Avoid bombs 💣. Miss 3 fruits and it's game over.</p>
    <button onclick="startGame()">Play</button>
  </div>
  <div id="gameover">
    <h2>Game Over</h2>
    <div class="final" id="finalScore"></div>
    <div class="best" id="bestScore"></div>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,dpr;
function resize(){dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
resize();window.addEventListener('resize',resize);

const FRUITS=[
  {emoji:'🍉',color:'#4ecdc4',r:32},
  {emoji:'🍊',color:'#ff9f43',r:28},
  {emoji:'🍎',color:'#ee5a24',r:28},
  {emoji:'🍋',color:'#ffd32a',r:26},
  {emoji:'🍇',color:'#6c5ce7',r:30},
  {emoji:'🥝',color:'#00b894',r:26},
  {emoji:'🍑',color:'#fd79a8',r:28},
  {emoji:'🍓',color:'#d63031',r:24},
];
const BOMB={emoji:'💣',color:'#2d3436',r:30};

let fruits=[],particles=[],sliceTrail=[],score=0,lives=0,best=+localStorage.getItem('fn_best')||0,playing=false,combo=0,comboTimer=0,spawnTimer=0,spawnInterval=1.2,elapsed=0;

class Fruit{
  constructor(isBomb){
    this.bomb=isBomb;
    const f=isBomb?BOMB:FRUITS[Math.random()*FRUITS.length|0];
    this.emoji=f.emoji;this.color=f.color;this.r=f.r;
    this.x=Math.random()*(W-100)+50;
    this.y=H+50;
    const ang=-Math.PI/2+(Math.random()-.5)*0.8;
    const spd=Math.sqrt(2*0.4*(H*0.55+Math.random()*H*0.2));
    this.vx=Math.cos(ang)*spd*(Math.random()>.5?1:-1)*0.5;
    this.vy=-spd;
    this.rot=Math.random()*Math.PI*2;
    this.vr=(Math.random()-.5)*0.15;
    this.sliced=false;this.missed=false;
  }
  update(dt){
    this.vy+=0.4*dt*60;
    this.x+=this.vx*dt*60;
    this.y+=this.vy*dt*60;
    this.rot+=this.vr*dt*60;
    if(this.y>H+80&&!this.sliced){this.missed=true}
  }
  draw(){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.font=`${this.r*2}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.emoji,0,0);
    ctx.restore();
  }
}

class Particle{
  constructor(x,y,color,big){
    this.x=x;this.y=y;this.color=color;
    const a=Math.random()*Math.PI*2,s=2+Math.random()*(big?8:5);
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-2;
    this.life=1;this.decay=0.02+Math.random()*0.02;
    this.r=big?4+Math.random()*4:2+Math.random()*3;
  }
  update(dt){this.x+=this.vx*dt*60;this.vy+=0.15*dt*60;this.y+=this.vy*dt*60;this.life-=this.decay*dt*60}
  draw(){ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
}

let trail=[];
function addTrailPoint(x,y){trail.push({x,y,life:1})}

function sliceFruit(f){
  f.sliced=true;
  if(f.bomb){endGame();return}
  score+=combo>1?combo:1;
  combo++;comboTimer=0.5;
  for(let i=0;i<12;i++)particles.push(new Particle(f.x,f.y,f.color,true));
  for(let i=0;i<6;i++)particles.push(new Particle(f.x,f.y,'#fff',false));
  document.getElementById('score').textContent=score;
}

function updateLivesUI(){
  const el=document.getElementById('lives');
  el.innerHTML='';
  for(let i=0;i<3;i++){const s=document.createElement('span');s.className='heart';s.textContent=i<lives?'❤️':'🖤';el.appendChild(s)}
}

function spawnWave(){
  const count=1+Math.floor(Math.random()*Math.min(4,1+elapsed/15));
  const bombChance=Math.min(0.25,0.05+elapsed/200);
  for(let i=0;i<count;i++){
    setTimeout(()=>{if(playing)fruits.push(new Fruit(Math.random()<bombChance))},i*150);
  }
}

let lastTime=0;
function loop(t){
  if(!playing){lastTime=0;return}
  if(!lastTime)lastTime=t;
  const dt=Math.min((t-lastTime)/1000,0.05);lastTime=t;
  elapsed+=dt;

  spawnTimer-=dt;
  if(spawnTimer<=0){spawnWave();spawnInterval=Math.max(0.6,spawnInterval-0.005);spawnTimer=spawnInterval}
  comboTimer-=dt;if(comboTimer<=0)combo=0;

  fruits.forEach(f=>f.update(dt));
  particles.forEach(p=>p.update(dt));
  trail.forEach(p=>p.life-=0.08*dt*60);
  trail=trail.filter(p=>p.life>0);
  particles=particles.filter(p=>p.life>0);

  const missed=fruits.filter(f=>f.missed&&!f.bomb);
  if(missed.length){lives-=missed.length;if(lives<0)lives=0;updateLivesUI();if(lives<=0){endGame();return}}
  fruits=fruits.filter(f=>!f.missed&&!(f.sliced&&f.y>H+80));

  // draw
  ctx.clearRect(0,0,W,H);
  // bg gradient
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a0a2e');bg.addColorStop(1,'#0d1b2a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // trail
  if(trail.length>1){
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(trail[0].x,trail[0].y);
    for(let i=1;i<trail.length;i++){ctx.globalAlpha=trail[i].life*0.7;ctx.lineTo(trail[i].x,trail[i].y)}
    ctx.stroke();ctx.globalAlpha=1;
  }

  particles.forEach(p=>p.draw());
  fruits.forEach(f=>{if(!f.sliced)f.draw()});

  // combo text
  if(combo>1&&comboTimer>0){
    ctx.globalAlpha=comboTimer*2;
    ctx.fillStyle='#ffd32a';ctx.font='bold 36px sans-serif';ctx.textAlign='center';
    ctx.fillText(`${combo}x Combo!`,W/2,80);ctx.globalAlpha=1;
  }

  requestAnimationFrame(loop);
}

// input
let swiping=false;
function getPos(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY}}
function onDown(e){if(!playing)return;swiping=true;trail=[];const p=getPos(e);addTrailPoint(p.x,p.y)}
function onMove(e){
  if(!playing||!swiping)return;e.preventDefault();
  const p=getPos(e);addTrailPoint(p.x,p.y);
  fruits.forEach(f=>{if(!f.sliced){const dx=f.x-p.x,dy=f.y-p.y;if(dx*dx+dy*dy<f.r*f.r*1.8)sliceFruit(f)}});
}
function onUp(){swiping=false}
canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);

function startGame(){
  score=0;lives=3;combo=0;comboTimer=0;elapsed=0;spawnInterval=1.2;spawnTimer=0.5;
  fruits=[];particles=[];trail=[];playing=true;lastTime=0;
  document.getElementById('score').textContent='0';
  updateLivesUI();
  document.getElementById('hud').style.display='flex';
  document.getElementById('menu').style.display='none';
  document.getElementById('gameover').style.display='none';
  requestAnimationFrame(loop);
}
function endGame(){
  playing=false;
  if(score>best){best=score;localStorage.setItem('fn_best',best)}
  document.getElementById('hud').style.display='none';
  document.getElementById('finalScore').textContent=`Score: ${score}`;
  document.getElementById('bestScore').textContent=`Best: ${best}`;
  document.getElementById('gameover').style.display='flex';
}
</script>
</body>
</html>
