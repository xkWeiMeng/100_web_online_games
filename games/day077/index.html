<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Archery Precision</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;color:#fff;user-select:none;-webkit-user-select:none}
canvas{display:block;border-radius:12px;touch-action:none}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;align-items:center}
#hud{width:100%;max-width:700px;display:flex;justify-content:space-between;padding:12px 20px;font-size:18px;font-weight:600;opacity:0;transition:opacity .3s}
#hud span{background:rgba(0,0,0,.45);padding:6px 16px;border-radius:20px;backdrop-filter:blur(6px)}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,30,.85);backdrop-filter:blur(8px);pointer-events:all;transition:opacity .4s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:clamp(28px,6vw,52px);margin-bottom:8px;background:linear-gradient(135deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#overlay p{font-size:clamp(14px,2.5vw,18px);color:#aab;max-width:420px;text-align:center;line-height:1.5;margin-bottom:24px}
#overlay .score-display{font-size:clamp(20px,4vw,36px);margin-bottom:6px;color:#ffd200}
button{pointer-events:all;background:linear-gradient(135deg,#f7971e,#ffd200);border:none;color:#1a1a2e;font-size:18px;font-weight:700;padding:14px 40px;border-radius:30px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(255,210,0,.3)}
button:hover{transform:scale(1.05)}
button:active{transform:scale(.97)}
.ring-legend{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.ring-legend span{font-size:13px;padding:3px 10px;border-radius:12px;font-weight:600}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <span id="hScore">Score: 0</span>
    <span id="hArrows">Arrows: 10</span>
    <span id="hRound">Round 1/3</span>
  </div>
  <div id="overlay">
    <h1>🏹 Archery Precision</h1>
    <p>Aim and release arrows at the target. The wind and sway make each shot a challenge! Tap/click to shoot when the crosshair aligns.</p>
    <div class="ring-legend">
      <span style="background:#ffd700;color:#333">Bull 10</span>
      <span style="background:#e74c3c">9</span>
      <span style="background:#3498db">7</span>
      <span style="background:#2ecc71">5</span>
      <span style="background:#ecf0f1;color:#333">3</span>
    </div>
    <button id="btnStart">Start Game</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const hud=document.getElementById('hud'),overlay=document.getElementById('overlay');
const hScore=document.getElementById('hScore'),hArrows=document.getElementById('hArrows'),hRound=document.getElementById('hRound');
const btnStart=document.getElementById('btnStart');

let W,H,cx,cy,targetR;
function resize(){
  const s=Math.min(window.innerWidth,window.innerHeight,700);
  W=canvas.width=s;H=canvas.height=s;
  cx=W/2;cy=H/2;targetR=W*.35;
}
resize();window.addEventListener('resize',resize);

const RINGS=[
  {r:1,color:'#ecf0f1',pts:3},
  {r:.75,color:'#2ecc71',pts:5},
  {r:.5,color:'#3498db',pts:7},
  {r:.28,color:'#e74c3c',pts:9},
  {r:.12,color:'#ffd700',pts:10}
];

let state='menu',score=0,arrows=0,round=0,totalRounds=3,arrowsPerRound=10;
let crossX=0,crossY=0,swayT=0,windX=0,windY=0;
let hits=[],lastHit=null,lastHitTimer=0;
let shotAnim=null; // {x,y,t}

function startGame(){
  score=0;round=0;hits=[];
  nextRound();
  overlay.classList.add('hidden');
  hud.style.opacity='1';
  state='play';
}

function nextRound(){
  round++;arrows=arrowsPerRound;hits=[];
  windX=(Math.random()-.5)*2;
  windY=(Math.random()-.5)*1.5;
  updateHUD();
}

function updateHUD(){
  hScore.textContent='Score: '+score;
  hArrows.textContent='Arrows: '+arrows;
  hRound.textContent='Round '+round+'/'+totalRounds;
}

function shoot(){
  if(state!=='play'||arrows<=0||shotAnim)return;
  const hx=crossX,hy=crossY;
  shotAnim={x:hx,y:hy,t:0};
}

function resolveShot(hx,hy){
  const dx=hx-cx,dy=hy-cy,dist=Math.sqrt(dx*dx+dy*dy);
  let pts=0;
  for(let i=RINGS.length-1;i>=0;i--){
    if(dist<=RINGS[i].r*targetR){pts=RINGS[i].pts;break;}
  }
  if(dist>targetR)pts=0;
  score+=pts;arrows--;
  hits.push({x:hx,y:hy,pts});
  lastHit={pts,t:1};
  updateHUD();
  if(arrows<=0){
    setTimeout(()=>{
      if(round>=totalRounds)endGame();
      else{nextRound();}
    },800);
  }
}

function endGame(){
  state='menu';hud.style.opacity='0';
  const max=totalRounds*arrowsPerRound*10;
  overlay.innerHTML=`<h1>🏹 Game Over</h1>
    <div class="score-display">${score} / ${max}</div>
    <p>${score>=max*.9?'Legendary marksman!':score>=max*.7?'Excellent shooting!':score>=max*.5?'Good effort!':'Keep practicing!'}</p>
    <button id="btnStart">Play Again</button>`;
  overlay.classList.remove('hidden');
  document.getElementById('btnStart').addEventListener('click',startGame);
}

// Input
canvas.addEventListener('pointerdown',shoot);

// Game loop
function update(dt){
  if(state!=='play')return;
  swayT+=dt;
  const sp=1.2+round*.3;
  crossX=cx+Math.sin(swayT*sp)*targetR*.6+Math.sin(swayT*sp*2.7)*(targetR*.15)+windX*20;
  crossY=cy+Math.cos(swayT*sp*.8)*targetR*.5+Math.cos(swayT*sp*1.9)*(targetR*.12)+windY*15;

  if(shotAnim){
    shotAnim.t+=dt*4;
    if(shotAnim.t>=1){resolveShot(shotAnim.x,shotAnim.y);shotAnim=null;}
  }
  if(lastHit){lastHit.t-=dt*1.5;if(lastHit.t<=0)lastHit=null;}
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // Sky gradient
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,W*.7);
  bg.addColorStop(0,'#2c3e50');bg.addColorStop(1,'#1a1a2e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Target
  for(const ring of RINGS){
    ctx.beginPath();ctx.arc(cx,cy,ring.r*targetR,0,Math.PI*2);
    ctx.fillStyle=ring.color;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=1.5;ctx.stroke();
  }
  // Cross lines on target
  ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-targetR,cy);ctx.lineTo(cx+targetR,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-targetR);ctx.lineTo(cx,cy+targetR);ctx.stroke();

  // Previous hits
  for(const h of hits){
    ctx.save();ctx.beginPath();ctx.arc(h.x,h.y,4,0,Math.PI*2);
    ctx.fillStyle='#222';ctx.fill();
    ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.stroke();
    // Fletching
    ctx.beginPath();ctx.arc(h.x,h.y,2,0,Math.PI*2);
    ctx.fillStyle='#c0392b';ctx.fill();
    ctx.restore();
  }

  if(state==='play'){
    // Wind indicator
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='13px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(`Wind: ${windX>0?'→':'←'} ${Math.abs(windX).toFixed(1)}  ${windY>0?'↓':'↑'} ${Math.abs(windY).toFixed(1)}`,cx,H-16);
    ctx.restore();

    // Crosshair
    if(!shotAnim){
      const sz=14;
      ctx.save();ctx.strokeStyle='rgba(255,60,60,.85)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(crossX-sz,crossY);ctx.lineTo(crossX+sz,crossY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(crossX,crossY-sz);ctx.lineTo(crossX,crossY+sz);ctx.stroke();
      ctx.beginPath();ctx.arc(crossX,crossY,sz*.7,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }

    // Shot animation
    if(shotAnim){
      const t=shotAnim.t;
      const ax=cx+(shotAnim.x-cx)*t,ay=H*(1-t)+shotAnim.y*t;
      ctx.save();ctx.translate(ax,ay);ctx.rotate(-Math.PI/2+Math.atan2(shotAnim.y-H,shotAnim.x-cx)*t);
      ctx.fillStyle='#8B4513';ctx.fillRect(-12,-1.5,24,3);
      // arrowhead
      ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(6,-4);ctx.lineTo(6,4);ctx.closePath();
      ctx.fillStyle='#bbb';ctx.fill();
      ctx.restore();
    }

    // Hit popup
    if(lastHit){
      ctx.save();ctx.globalAlpha=lastHit.t;
      ctx.fillStyle=lastHit.pts>=10?'#ffd700':lastHit.pts>=7?'#3498db':lastHit.pts>=5?'#2ecc71':lastHit.pts>0?'#ecf0f1':'#e74c3c';
      ctx.font='bold 32px sans-serif';ctx.textAlign='center';
      ctx.fillText(lastHit.pts>0?'+'+lastHit.pts:'Miss!',cx,cy-targetR-20+(1-lastHit.t)*30);
      ctx.restore();
    }
  }
}

let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

btnStart.addEventListener('click',startGame);
</script>
</body>
</html>
