<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Space Invaders: Boss Battles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;touch-action:none}
canvas{display:block;margin:0 auto}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;align-items:center;justify-content:center}
#overlay{pointer-events:auto;text-align:center;padding:30px;background:rgba(0,0,0,.85);border:2px solid #0ff;border-radius:16px;max-width:420px;width:90%}
#overlay h1{font-size:28px;color:#0ff;text-shadow:0 0 20px #0ff;margin-bottom:12px}
#overlay h2{font-size:20px;color:#f0f;margin-bottom:8px}
#overlay p{font-size:14px;color:#aaa;margin-bottom:6px;line-height:1.5}
#overlay .score-display{font-size:32px;color:#ff0;margin:12px 0}
button{pointer-events:auto;background:linear-gradient(135deg,#0ff,#08f);color:#000;border:none;padding:14px 40px;font-size:18px;font-weight:700;border-radius:8px;cursor:pointer;margin-top:16px;text-transform:uppercase;letter-spacing:2px}
button:hover{filter:brightness(1.2)}
#hud{position:absolute;top:0;left:0;width:100%;padding:8px 16px;display:flex;justify-content:space-between;font-size:16px;pointer-events:none}
#hud span{text-shadow:0 0 8px #0ff}
.lives{color:#f44}
.wave-info{color:#0ff}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud" class="hidden">
  <span class="wave-info" id="waveText">Wave 1</span>
  <span id="scoreText">Score: 0</span>
  <span class="lives" id="livesText">♥♥♥</span>
</div>
<div id="ui">
  <div id="overlay">
    <h1>🚀 SPACE INVADERS</h1>
    <h2>Boss Battles Edition</h2>
    <p>Arrow keys / WASD or touch to move<br>Space or tap to shoot<br>Destroy all invaders, then face the boss!</p>
    <p style="color:#f0f;margin-top:8px">Every 3 waves a powerful boss appears.<br>Bosses shoot back — dodge carefully!</p>
    <button id="startBtn">Start Game</button>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),ui=document.getElementById('ui'),overlay=document.getElementById('overlay'),hud=document.getElementById('hud');
let W,H,scale;
function resize(){W=canvas.width=Math.min(window.innerWidth,600);H=canvas.height=Math.min(window.innerHeight,900);scale=W/600}
resize();window.addEventListener('resize',resize);

// Game state
let state='menu',score=0,lives=3,wave=0,shakeTime=0;
let player,bullets,enemyBullets,enemies,particles,boss,powerups;
let keys={},touchX=null,touchShoot=false;

// Input
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault()});
document.addEventListener('keyup',e=>keys[e.key]=false);
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];touchX=t.clientX-canvas.getBoundingClientRect().left;touchShoot=true});
canvas.addEventListener('touchmove',e=>{e.preventDefault();touchX=e.touches[0].clientX-canvas.getBoundingClientRect().left});
canvas.addEventListener('touchend',()=>{touchX=null;touchShoot=false});

document.getElementById('startBtn').addEventListener('click',startGame);

function startGame(){
  state='play';score=0;lives=3;wave=0;
  overlay.classList.add('hidden');hud.classList.remove('hidden');
  player={x:W/2,y:H-60*scale,w:36*scale,h:28*scale,speed:5*scale,shootCd:0,invuln:0,powerLevel:1,powerTime:0};
  bullets=[];enemyBullets=[];enemies=[];particles=[];powerups=[];boss=null;
  nextWave();
  requestAnimationFrame(loop);
}

function nextWave(){
  wave++;
  document.getElementById('waveText').textContent=wave%3===0?`BOSS ${Math.floor(wave/3)}`:`Wave ${wave}`;
  if(wave%3===0){spawnBoss()}else{spawnEnemies()}
}

function spawnEnemies(){
  enemies=[];
  const cols=Math.min(6+Math.floor(wave/2),10),rows=Math.min(2+Math.floor(wave/3),5);
  const gap=48*scale,offX=(W-cols*gap)/2+gap/2;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const type=r===0?2:r<2?1:0;
    enemies.push({x:offX+c*gap,y:60*scale+r*gap,w:30*scale,h:24*scale,type,hp:type+1,dir:1,speed:(1+wave*0.15)*scale,shootCd:Math.random()*200+100,dropY:0});
  }
}

function spawnBoss(){
  const bossNum=Math.floor(wave/3);
  boss={x:W/2,y:-80*scale,w:100*scale,h:70*scale,hp:30+bossNum*20,maxHp:30+bossNum*20,
    speed:2*scale,dir:1,phase:0,shootCd:0,patterns:[0,1,2],moveY:80*scale,
    color:['#f0f','#f80','#0ff'][bossNum%3],entering:true};
}

function spawnParticle(x,y,color,count=5){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*s*scale,vy:Math.sin(a)*s*scale,life:30+Math.random()*20,color,size:(Math.random()*3+1)*scale});
  }
}

let lastTime=0;
function loop(t){
  if(state!=='play'){return}
  const dt=Math.min(t-lastTime,32)/16;lastTime=t;
  update(dt);draw();
  requestAnimationFrame(loop);
}

function update(dt){
  // Player move
  let dx=0;
  if(keys['ArrowLeft']||keys['a'])dx=-1;
  if(keys['ArrowRight']||keys['d'])dx=1;
  if(touchX!==null)dx=touchX<player.x?-1:touchX>player.x+player.w?1:0;
  player.x+=dx*player.speed*dt;
  player.x=Math.max(0,Math.min(W-player.w,player.x));

  // Shoot
  player.shootCd-=dt;
  if(player.shootCd<=0&&(keys[' ']||keys['ArrowUp']||keys['w']||touchShoot)){
    player.shootCd=player.powerLevel>=2?6:10;
    const cx=player.x+player.w/2;
    bullets.push({x:cx-2*scale,y:player.y,w:4*scale,h:12*scale,vy:-7*scale,dmg:1});
    if(player.powerLevel>=2){
      bullets.push({x:cx-12*scale,y:player.y+6*scale,w:3*scale,h:10*scale,vy:-6.5*scale,dmg:1,vx:-0.5*scale});
      bullets.push({x:cx+10*scale,y:player.y+6*scale,w:3*scale,h:10*scale,vy:-6.5*scale,dmg:1,vx:0.5*scale});
    }
  }
  if(player.powerTime>0){player.powerTime-=dt;if(player.powerTime<=0)player.powerLevel=1}
  if(player.invuln>0)player.invuln-=dt;

  // Bullets
  bullets.forEach(b=>{b.y+=b.vy*dt;b.x+=(b.vx||0)*dt});
  bullets=bullets.filter(b=>b.y>-20);

  // Enemy bullets
  enemyBullets.forEach(b=>{b.y+=b.vy*dt;b.x+=(b.vx||0)*dt});
  enemyBullets=enemyBullets.filter(b=>b.y<H+20&&b.x>-20&&b.x<W+20);

  // Enemies
  if(!boss){
    let edgeHit=false;
    enemies.forEach(e=>{
      e.x+=e.dir*e.speed*dt;
      if(e.x<=0||e.x+e.w>=W)edgeHit=true;
      e.shootCd-=dt;
      if(e.shootCd<=0&&Math.random()<0.02){
        e.shootCd=80+Math.random()*120;
        enemyBullets.push({x:e.x+e.w/2-2*scale,y:e.y+e.h,w:4*scale,h:10*scale,vy:3.5*scale});
      }
    });
    if(edgeHit){enemies.forEach(e=>{e.dir*=-1;e.y+=12*scale})}

    // Bullet-enemy collision
    bullets=bullets.filter(b=>{
      let hit=false;
      enemies.forEach(e=>{
        if(!hit&&b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){
          e.hp-=b.dmg;hit=true;
          if(e.hp<=0){
            score+=(e.type+1)*10;spawnParticle(e.x+e.w/2,e.y+e.h/2,['#0f0','#ff0','#f0f'][e.type],8);
            if(Math.random()<0.08)powerups.push({x:e.x,y:e.y,w:16*scale,h:16*scale,vy:2*scale,type:'power'});
          }
        }
      });return !hit;
    });
    enemies=enemies.filter(e=>e.hp>0);

    // Check if enemies reached bottom
    if(enemies.some(e=>e.y+e.h>=player.y)){hitPlayer();enemies=[]}

    if(enemies.length===0&&state==='play')setTimeout(()=>{if(state==='play')nextWave()},800);
  }

  // Boss
  if(boss){
    if(boss.entering){boss.y+=2*scale*dt;if(boss.y>=boss.moveY){boss.entering=false}}
    else{
      boss.x+=boss.dir*boss.speed*dt;
      if(boss.x<=10||boss.x+boss.w>=W-10)boss.dir*=-1;
      boss.shootCd-=dt;
      if(boss.shootCd<=0){
        boss.shootCd=25-Math.floor(wave/3)*3;
        const cx=boss.x+boss.w/2,cy=boss.y+boss.h;
        const pattern=boss.phase%3;
        if(pattern===0){
          enemyBullets.push({x:cx-3*scale,y:cy,w:6*scale,h:14*scale,vy:4*scale,vx:0});
        }else if(pattern===1){
          for(let a=-2;a<=2;a++)enemyBullets.push({x:cx-3*scale,y:cy,w:5*scale,h:10*scale,vy:3.5*scale,vx:a*1.2*scale});
        }else{
          const ang=Math.atan2(player.y-cy,player.x+player.w/2-cx);
          enemyBullets.push({x:cx-3*scale,y:cy,w:6*scale,h:12*scale,vy:Math.sin(ang)*4.5*scale,vx:Math.cos(ang)*4.5*scale});
        }
        boss.phase++;
      }
    }
    // Bullet-boss collision
    bullets=bullets.filter(b=>{
      if(boss&&b.x<boss.x+boss.w&&b.x+b.w>boss.x&&b.y<boss.y+boss.h&&b.y+b.h>boss.y){
        boss.hp-=b.dmg;spawnParticle(b.x,b.y,boss.color,2);shakeTime=3;
        if(boss.hp<=0){
          score+=500*Math.floor(wave/3);spawnParticle(boss.x+boss.w/2,boss.y+boss.h/2,'#fff',40);
          boss=null;setTimeout(()=>{if(state==='play')nextWave()},1200);
        }
        return false;
      }return true;
    });
  }

  // Enemy bullet - player collision
  if(player.invuln<=0){
    enemyBullets=enemyBullets.filter(b=>{
      if(b.x<player.x+player.w&&b.x+b.w>player.x&&b.y<player.y+player.h&&b.y+b.h>player.y){
        hitPlayer();return false;
      }return true;
    });
  }

  // Powerups
  powerups.forEach(p=>p.y+=p.vy*dt);
  powerups=powerups.filter(p=>{
    if(p.y>H)return false;
    if(p.x<player.x+player.w&&p.x+p.w>player.x&&p.y<player.y+player.h&&p.y+p.h>player.y){
      player.powerLevel=2;player.powerTime=600;score+=25;return false;
    }return true;
  });

  // Particles
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt});
  particles=particles.filter(p=>p.life>0);

  // Shake
  if(shakeTime>0)shakeTime-=dt;

  updateHUD();
}

function hitPlayer(){
  lives--;shakeTime=8;player.invuln=60;
  spawnParticle(player.x+player.w/2,player.y+player.h/2,'#f44',12);
  if(lives<=0)gameOver();
}

function gameOver(){
  state='over';hud.classList.add('hidden');overlay.classList.remove('hidden');
  overlay.innerHTML=`<h1>GAME OVER</h1><div class="score-display">Score: ${score}</div><p>You reached wave ${wave}</p><button id="startBtn">Play Again</button>`;
  document.getElementById('startBtn').addEventListener('click',startGame);
}

function updateHUD(){
  document.getElementById('scoreText').textContent=`Score: ${score}`;
  document.getElementById('livesText').textContent='♥'.repeat(Math.max(0,lives));
}

function draw(){
  ctx.save();
  if(shakeTime>0){ctx.translate(Math.random()*6-3,Math.random()*6-3)}

  // BG
  ctx.fillStyle='#060612';ctx.fillRect(0,0,W,H);
  // Stars
  for(let i=0;i<50;i++){
    const sx=(i*137.5+lastTime*0.01*((i%3)+1)*0.3)%W;
    const sy=(i*97.3+lastTime*0.005*((i%2)+1))%H;
    ctx.fillStyle=`rgba(255,255,255,${0.3+i%3*0.2})`;ctx.fillRect(sx,sy,1.5*scale,1.5*scale);
  }

  // Player
  if(player.invuln<=0||Math.floor(player.invuln)%4<2){
    ctx.fillStyle=player.powerLevel>=2?'#0ff':'#4f8';
    ctx.beginPath();
    const px=player.x,py=player.y,pw=player.w,ph=player.h;
    ctx.moveTo(px+pw/2,py);ctx.lineTo(px+pw,py+ph);ctx.lineTo(px,py+ph);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(px+pw/2-2*scale,py+4*scale,4*scale,8*scale);
    // Engine glow
    ctx.fillStyle='rgba(255,100,0,0.6)';ctx.fillRect(px+pw/2-5*scale,py+ph,10*scale,(6+Math.sin(lastTime*0.02)*3)*scale);
  }

  // Bullets
  ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';ctx.shadowBlur=8;
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));
  ctx.shadowBlur=0;

  // Enemy bullets
  ctx.fillStyle='#f44';ctx.shadowColor='#f44';ctx.shadowBlur=6;
  enemyBullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));
  ctx.shadowBlur=0;

  // Enemies
  const cols=['#4f4','#ff0','#f4f'];
  enemies.forEach(e=>{
    ctx.fillStyle=cols[e.type];
    ctx.fillRect(e.x,e.y,e.w,e.h);
    // Eyes
    ctx.fillStyle='#000';
    ctx.fillRect(e.x+6*scale,e.y+8*scale,5*scale,4*scale);
    ctx.fillRect(e.x+e.w-11*scale,e.y+8*scale,5*scale,4*scale);
  });

  // Boss
  if(boss){
    const hpPct=boss.hp/boss.maxHp;
    ctx.fillStyle=boss.color;ctx.shadowColor=boss.color;ctx.shadowBlur=15;
    ctx.fillRect(boss.x,boss.y,boss.w,boss.h);
    // Boss detail
    ctx.fillStyle='#000';
    ctx.fillRect(boss.x+15*scale,boss.y+20*scale,14*scale,10*scale);
    ctx.fillRect(boss.x+boss.w-29*scale,boss.y+20*scale,14*scale,10*scale);
    ctx.fillStyle='#f00';
    ctx.fillRect(boss.x+boss.w/2-6*scale,boss.y+boss.h-10*scale,12*scale,6*scale);
    ctx.shadowBlur=0;
    // HP bar
    ctx.fillStyle='#333';ctx.fillRect(boss.x,boss.y-14*scale,boss.w,8*scale);
    ctx.fillStyle=hpPct>0.5?'#0f0':hpPct>0.25?'#ff0':'#f00';
    ctx.fillRect(boss.x,boss.y-14*scale,boss.w*hpPct,8*scale);
  }

  // Powerups
  powerups.forEach(p=>{
    ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(p.x+p.w/2,p.y+p.h/2,p.w/2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.font=`${12*scale}px sans-serif`;ctx.fillText('P',p.x+3*scale,p.y+12*scale);
    ctx.shadowBlur=0;
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/50;ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  });
  ctx.globalAlpha=1;

  ctx.restore();
}
</script>
</body>
</html>
