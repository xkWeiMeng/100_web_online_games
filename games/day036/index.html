<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Generator & Solver</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
h1{font-size:1.8rem;margin:12px 0 4px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0}
button{background:linear-gradient(135deg,#7b2ff7,#00d4ff);border:none;color:#fff;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;transition:transform .1s,opacity .15s}
button:hover{opacity:.85}button:active{transform:scale(.95)}
button.secondary{background:linear-gradient(135deg,#f72f8e,#ff8c00)}
select,label{font-size:.85rem}
select{background:#1a1a2e;color:#e0e0e0;border:1px solid #333;padding:4px 8px;border-radius:6px}
.stats{font-size:.85rem;display:flex;gap:16px;margin:4px 0;color:#aaa}
.stats span{color:#00d4ff;font-weight:700}
canvas{border-radius:8px;border:2px solid #222;touch-action:none;margin:6px 0}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:10}
.modal{background:#14142a;border:1px solid #333;border-radius:16px;padding:32px 28px;max-width:420px;text-align:center}
.modal h2{font-size:1.5rem;margin-bottom:12px;color:#00d4ff}
.modal p{font-size:.9rem;line-height:1.6;color:#bbb;margin-bottom:16px}
.modal .keys{display:inline-grid;grid-template-columns:repeat(3,40px);gap:4px;margin:8px auto}
.modal .key{background:#222;border-radius:6px;padding:6px;font-size:1rem}
.win{color:#0f0}
@media(max-width:500px){h1{font-size:1.3rem}.modal{padding:20px 16px;margin:12px}}
</style>
</head>
<body>

<div id="overlay">
<div class="modal">
<h2>🏰 Maze Explorer</h2>
<p>Navigate from the <span style="color:#0f0">green start</span> to the <span style="color:#f44">red exit</span> in the fewest moves possible.</p>
<p><b>Controls:</b> Arrow keys, WASD, or swipe on mobile.<br>Press <b>H</b> for a hint (costs 10 moves).</p>
<div class="controls">
<label>Size:
<select id="sizeSelect">
<option value="10">Small (10)</option>
<option value="20" selected>Medium (20)</option>
<option value="30">Large (30)</option>
<option value="45">Huge (45)</option>
</select>
</label>
</div>
<button id="startBtn" style="margin-top:8px;padding:12px 36px;font-size:1rem">Start Game</button>
</div>
</div>

<h1>Maze Explorer</h1>
<div class="stats">
  <div>Moves: <span id="moveCount">0</span></div>
  <div>Best: <span id="bestCount">-</span></div>
  <div>Time: <span id="timer">0s</span></div>
</div>
<canvas id="c"></canvas>
<div class="controls">
<button id="solveBtn">Solve (A*)</button>
<button id="hintBtn" class="secondary">Hint (H)</button>
<button id="newBtn">New Maze</button>
</div>

<script>
const $ = id => document.getElementById(id);
const canvas = $('c'), ctx = canvas.getContext('2d');
let cols, rows, cellSize, grid, player, endPos, moves, bestMoves, startTime, timerInterval, solved, solutionPath, hintShown;

// --- Maze generation (Recursive Backtracker) ---
function initMaze(size) {
  cols = rows = size;
  const maxPx = Math.min(window.innerWidth - 16, window.innerHeight - 160, 600);
  cellSize = Math.floor(maxPx / cols);
  canvas.width = cols * cellSize;
  canvas.height = rows * cellSize;
  grid = Array.from({length: rows}, () => Array.from({length: cols}, () => ({top:true,right:true,bottom:true,left:true,visited:false})));
  // DFS carve
  const stack = [[0,0]];
  grid[0][0].visited = true;
  const dirs = [[-1,0,'top','bottom'],[1,0,'bottom','top'],[0,-1,'left','right'],[0,1,'right','left']];
  while (stack.length) {
    const [r,c] = stack[stack.length-1];
    const neighbors = dirs.map(([dr,dc,w1,w2])=>[r+dr,c+dc,w1,w2]).filter(([nr,nc])=>nr>=0&&nr<rows&&nc>=0&&nc<cols&&!grid[nr][nc].visited);
    if (!neighbors.length) { stack.pop(); continue; }
    const [nr,nc,w1,w2] = neighbors[Math.random()*neighbors.length|0];
    grid[r][c][w1] = false;
    grid[nr][nc][w2] = false;
    grid[nr][nc].visited = true;
    stack.push([nr,nc]);
  }
}

// --- A* solver ---
function solve(sr,sc,er,ec) {
  const h = (r,c) => Math.abs(r-er)+Math.abs(c-ec);
  const open = [{r:sr,c:sc,g:0,f:h(sr,sc),path:[]}];
  const closed = new Set();
  const dirs = [[-1,0,'top'],[1,0,'bottom'],[0,-1,'left'],[0,1,'right']];
  while (open.length) {
    open.sort((a,b)=>a.f-b.f);
    const cur = open.shift();
    const key = cur.r*1000+cur.c;
    if (closed.has(key)) continue;
    closed.add(key);
    if (cur.r===er&&cur.c===ec) return [...cur.path,[er,ec]];
    for (const [dr,dc,wall] of dirs) {
      if (grid[cur.r][cur.c][wall]) continue;
      const nr=cur.r+dr, nc=cur.c+dc;
      if (closed.has(nr*1000+nc)) continue;
      open.push({r:nr,c:nc,g:cur.g+1,f:cur.g+1+h(nr,nc),path:[...cur.path,[cur.r,cur.c]]});
    }
  }
  return [];
}

// --- Drawing ---
function draw() {
  ctx.fillStyle = '#0e0e24';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const cs = cellSize;
  // cells
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    const x=c*cs,y=r*cs,cell=grid[r][c];
    ctx.strokeStyle='#3a3a6a';ctx.lineWidth=2;
    if(cell.top){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cs,y);ctx.stroke()}
    if(cell.right){ctx.beginPath();ctx.moveTo(x+cs,y);ctx.lineTo(x+cs,y+cs);ctx.stroke()}
    if(cell.bottom){ctx.beginPath();ctx.moveTo(x,y+cs);ctx.lineTo(x+cs,y+cs);ctx.stroke()}
    if(cell.left){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cs);ctx.stroke()}
  }
  // solution path
  if (solutionPath && solutionPath.length) {
    ctx.strokeStyle='rgba(123,47,247,.35)';ctx.lineWidth=cs*.3;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();
    solutionPath.forEach(([r,c],i)=>{const px=c*cs+cs/2,py=r*cs+cs/2;i?ctx.lineTo(px,py):ctx.moveTo(px,py)});
    ctx.stroke();
  }
  // start & end
  ctx.fillStyle='rgba(0,255,80,.25)';ctx.fillRect(0,0,cs,cs);
  ctx.fillStyle='rgba(255,50,50,.3)';ctx.fillRect(endPos[1]*cs,endPos[0]*cs,cs,cs);
  // player
  const px=player[1]*cs+cs/2, py=player[0]*cs+cs/2;
  ctx.beginPath();ctx.arc(px,py,cs*.32,0,Math.PI*2);
  ctx.fillStyle='#00d4ff';ctx.fill();
  ctx.shadowBlur=12;ctx.shadowColor='#00d4ff';ctx.fill();ctx.shadowBlur=0;
}

// --- Game logic ---
function startGame() {
  const size = +$('sizeSelect').value;
  initMaze(size);
  player = [0,0];
  endPos = [rows-1, cols-1];
  moves = 0; solved = false; solutionPath = null; hintShown = false;
  $('moveCount').textContent = 0;
  $('overlay').style.display = 'none';
  clearInterval(timerInterval);
  startTime = Date.now();
  timerInterval = setInterval(()=>{if(!solved) $('timer').textContent=((Date.now()-startTime)/1000|0)+'s'},200);
  draw();
}

function movePlayer(dr,dc) {
  if (solved) return;
  const [r,c] = player;
  const wall = dr===-1?'top':dr===1?'bottom':dc===-1?'left':'right';
  if (grid[r][c][wall]) return;
  player = [r+dr, c+dc];
  moves++;
  $('moveCount').textContent = moves;
  draw();
  if (player[0]===endPos[0]&&player[1]===endPos[1]) winGame();
}

function winGame() {
  solved = true;
  clearInterval(timerInterval);
  const key = 'maze_best_'+cols;
  const prev = localStorage.getItem(key);
  if (!prev || moves < +prev) { localStorage.setItem(key, moves); }
  $('bestCount').textContent = localStorage.getItem(key) || '-';
  setTimeout(()=>{
    $('overlay').style.display='flex';
    $('overlay').querySelector('.modal').innerHTML=`
      <h2 class="win">🎉 You Won!</h2>
      <p>Solved the ${cols}×${rows} maze in <b>${moves}</b> moves and <b>${((Date.now()-startTime)/1000|0)}s</b>.</p>
      <p>Best: <b>${localStorage.getItem(key)}</b> moves</p>
      <button onclick="startGame()" style="margin-top:8px;padding:12px 36px;font-size:1rem">Play Again</button>
    `;
  },300);
}

function showSolution() {
  solutionPath = solve(player[0],player[1],endPos[0],endPos[1]);
  solved = true;
  draw();
}

function showHint() {
  if (solved) return;
  const path = solve(player[0],player[1],endPos[0],endPos[1]);
  if (path.length>1) {
    solutionPath = path.slice(0, Math.min(6, path.length));
    moves += 10;
    $('moveCount').textContent = moves;
    draw();
    setTimeout(()=>{solutionPath=null;draw()},1500);
  }
}

// --- Input ---
document.addEventListener('keydown', e => {
  const map = {ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1],w:[-1,0],s:[1,0],a:[0,-1],d:[0,1],W:[-1,0],S:[1,0],A:[0,-1],D:[0,1]};
  if (map[e.key]) { e.preventDefault(); movePlayer(...map[e.key]); }
  if (e.key==='h'||e.key==='H') showHint();
});

// Touch / swipe
let touchStart = null;
canvas.addEventListener('pointerdown', e => { touchStart = {x:e.clientX,y:e.clientY}; });
canvas.addEventListener('pointerup', e => {
  if (!touchStart) return;
  const dx=e.clientX-touchStart.x, dy=e.clientY-touchStart.y;
  if (Math.max(Math.abs(dx),Math.abs(dy))<15) return;
  if (Math.abs(dx)>Math.abs(dy)) movePlayer(0,dx>0?1:-1);
  else movePlayer(dy>0?1:-1,0);
  touchStart=null;
});

$('startBtn').addEventListener('click', startGame);
$('solveBtn').addEventListener('click', showSolution);
$('hintBtn').addEventListener('click', showHint);
$('newBtn').addEventListener('click', startGame);

// Update best on size change
$('sizeSelect').addEventListener('change', () => {
  const b = localStorage.getItem('maze_best_'+$('sizeSelect').value);
  $('bestCount').textContent = b || '-';
});
</script>
</body>
</html>
